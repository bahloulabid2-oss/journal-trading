<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Journal Trading">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c0f">
<title>Journal de trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
html, body { background: #0a0c0f; margin: 0; padding: 0; }
body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
:root {
  --bg: #0a0c0f;
  --card: #14171c;
  --card-hover: #1a1e24;
  --line: rgba(255,255,255,0.07);
  --gold: #d9a94f;
  --gold-dim: rgba(217,169,79,0.14);
  --green: #34c98e;
  --green-dim: rgba(52,201,142,0.13);
  --red: #e8615c;
  --red-dim: rgba(232,97,92,0.13);
  --text: #eef0f2;
  --text-dim: #8a8f98;
  --text-faint: #4d5158;
}
* { box-sizing: border-box; }
.app { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; max-width: 480px; margin: 0 auto; padding: 26px 18px 100px; min-height: 100vh; }
.fab { position: fixed; bottom: max(22px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; display: flex; justify-content: flex-end; padding: 0 18px; pointer-events: none; z-index: 20; box-sizing: border-box; }
.fab button { pointer-events: auto; background: var(--gold); color: #241a06; border: none; width: 52px; height: 52px; border-radius: 50%; font-size: 26px; cursor: pointer; box-shadow: 0 6px 20px rgba(217,169,79,0.35); display: flex; align-items: center; justify-content: center; line-height: 1; }
.fab button:active { transform: scale(0.92); }

.brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 10px; }
.brand-left { display: flex; align-items: center; gap: 10px; }
.brand h1 { font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.brand-right { display: flex; align-items: center; gap: 8px; }
.brand .ticker { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--gold); background: var(--gold-dim); padding: 3px 8px; border-radius: 5px; letter-spacing: 0.04em; }
.icon-btn, .menu-btn { background: var(--card); border: 1px solid var(--line); color: var(--text-dim); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.icon-btn svg, .menu-btn svg { width: 16px; height: 16px; }
.icon-btn:hover, .menu-btn:hover { color: var(--gold); border-color: var(--gold); }

.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; z-index: 40; }
.drawer-overlay.show { display: block; }
.drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 76%; max-width: 280px; background: var(--card); border-right: 1px solid var(--line); transform: translateX(-105%); transition: transform 0.28s cubic-bezier(.4,0,.2,1); z-index: 41; padding: 28px 14px; padding-top: calc(28px + env(safe-area-inset-top)); display: flex; flex-direction: column; gap: 3px; }
.drawer.show { transform: translateX(0); }
.drawer-title { font-family: 'Space Grotesk', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin: 4px 0 14px 10px; }
.drawer-item { display: flex; align-items: center; gap: 12px; padding: 13px 12px; border-radius: 10px; color: var(--text-dim); cursor: pointer; font-size: 14.5px; font-weight: 500; }
.drawer-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.drawer-item.active { background: var(--gold-dim); color: var(--gold); }
.drawer-item:hover:not(.active) { background: var(--card-hover); }
.drawer-footer { margin-top: auto; padding: 10px 12px; font-size: 10.5px; color: var(--text-faint); }

.view-toggle { display: flex; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.view-toggle button { flex: 1; background: transparent; border: none; color: var(--text-dim); padding: 8px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; }
.view-toggle button.active { background: var(--card-hover); color: var(--text); }

.section-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 9px 2px; display: flex; align-items: center; justify-content: space-between; }
.capital-card { background: radial-gradient(120% 140% at 0% 0%, #201a0c 0%, #14171c 55%); border: 1px solid rgba(217,169,79,0.28); border-radius: 16px; padding: 18px 20px 6px; margin-bottom: 14px; position: relative; overflow: hidden; }
.capital-card .edit-cap { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 11.5px; z-index: 2; }
.capital-card .edit-cap:hover { color: var(--gold); }
.cap-label { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.cap-value { font-family: 'IBM Plex Mono', monospace; font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }
.cap-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 14px; }
.cap-sub .pos { color: var(--green); } .cap-sub .neg { color: var(--red); }
.cap-curve-title { font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.curve-empty { text-align: center; padding: 18px 0 8px; color: var(--text-faint); font-size: 12px; }
.curve-draw { stroke-dasharray: 900; stroke-dashoffset: 900; animation: drawline 1.1s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes drawline { to { stroke-dashoffset: 0; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeUp 0.45s ease both; }

.nav { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 14px; }
.nav button { background: var(--card); border: 1px solid var(--line); color: var(--text); width: 32px; height: 32px; border-radius: 9px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
.nav .month-label { font-family: 'Space Grotesk', sans-serif; font-size: 15.5px; font-weight: 600; text-transform: capitalize; }

.goal-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 15px 17px; margin-bottom: 14px; }
.goal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
.goal-label { font-size: 11.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
.goal-rate { font-size: 11px; color: var(--gold); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }
.goal-edit { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 12.5px; padding: 2px 6px; }
.goal-edit:hover { color: var(--gold); }
.goal-track { height: 7px; border-radius: 5px; background: rgba(255,255,255,0.06); overflow: hidden; margin-bottom: 9px; }
.goal-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #b9862f, var(--gold)); transition: width 0.7s cubic-bezier(.4,0,.2,1); }
.goal-fill.neg { background: linear-gradient(90deg, #8a2f2c, var(--red)); }
.goal-nums { display: flex; align-items: baseline; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; }
.goal-nums .cur { font-size: 18px; font-weight: 600; }
.goal-nums .cur.pos { color: var(--green); } .goal-nums .cur.neg { color: var(--red); }
.goal-nums .target { font-size: 11.5px; color: var(--text-faint); }
.goal-banner { margin-top: 11px; background: var(--gold-dim); border-radius: 9px; padding: 8px 11px; font-size: 12px; color: var(--gold); }

.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 6px; }
.weekdays span { text-align: center; font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.03em; }
.grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 16px; }
.cell { aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--line); background: var(--card); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 0 2px 6px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; position: relative; overflow: hidden; transition: border-color 0.15s; }
.cell:active { transform: scale(0.94); }
.cell:hover { border-color: rgba(255,255,255,0.15); }
.cell.out { visibility: hidden; }
.cell .d { position: absolute; top: 4px; left: 6px; font-size: 9px; font-weight: 500; color: var(--text-faint); font-family: 'Inter', sans-serif; z-index: 2; opacity: 0.55; }
.cell.filled .d { color: rgba(255,255,255,0.45); }
.cell .p { font-size: 10.5px; font-weight: 800; line-height: 1.15; z-index: 2; text-align: center; }
.cell .tgt { font-size: 8.5px; font-weight: 600; color: var(--gold); opacity: 0.8; line-height: 1.1; z-index: 2; text-align: center; }
.cell.weekend { background: rgba(255,255,255,0.015); border-color: transparent; }
.cell.weekend .d { opacity: 0.3; }
.cell .closed { font-size: 8px; color: var(--text-faint); opacity: 0.5; text-transform: uppercase; letter-spacing: 0.03em; z-index: 2; text-align: center; }
.cell.today { border-color: var(--gold); }
.note-dot { position: absolute; bottom: 4px; right: 5px; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); z-index: 3; }

.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
.kpi-grid.compact { grid-template-columns: repeat(3, 1fr); }
.kpi { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; }
.kpi-top { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.kpi-top svg { width: 14px; height: 14px; color: var(--text-faint); flex-shrink: 0; }
.kpi-label { font-size: 10.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
.kpi-val { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; }
.kpi-val.pos { color: var(--green); } .kpi-val.neg { color: var(--red); }
.kpi-sub { font-size: 10.5px; color: var(--text-faint); margin-top: 2px; }

.forecast-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 17px; margin-bottom: 14px; }
.forecast-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.forecast-pills { display: flex; gap: 6px; margin-bottom: 12px; }
.forecast-pills button { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--text-dim); padding: 6px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
.forecast-pills button.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
.forecast-legend { display: flex; gap: 14px; margin-bottom: 8px; font-size: 11.5px; }
.forecast-legend span { display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
.forecast-legend i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
.forecast-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.forecast-row { display: flex; justify-content: space-between; align-items: baseline; padding-top: 8px; border-top: 1px solid var(--line); }
.forecast-row .fl { font-size: 12px; color: var(--text-dim); }
.forecast-row .fv { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; }
.forecast-warn { font-size: 11.5px; color: var(--text-faint); margin-top: 12px; line-height: 1.5; padding-top: 10px; border-top: 1px solid var(--line); }
.year-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.year-months { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.mcard { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 12px; cursor: pointer; }
.mcard:active { transform: scale(0.97); }
.mcard .mname { font-size: 11.5px; color: var(--text-dim); text-transform: capitalize; margin-bottom: 6px; }
.mcard .mval { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; }
.mcard .mval.empty { color: var(--text-faint); font-weight: 400; }
.mcard.current { border-color: var(--gold); }

.today-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 22px 20px; margin-bottom: 14px; text-align: center; position: relative; overflow: hidden; }
.today-card.pos { border-color: rgba(52,201,142,0.35); background: radial-gradient(120% 140% at 50% 0%, rgba(52,201,142,0.12) 0%, var(--card) 60%); }
.today-card.neg { border-color: rgba(232,97,92,0.35); background: radial-gradient(120% 140% at 50% 0%, rgba(232,97,92,0.12) 0%, var(--card) 60%); }
.today-label { font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.today-value { font-family: 'IBM Plex Mono', monospace; font-size: 42px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.today-value.pos { color: var(--green); } .today-value.neg { color: var(--red); }
.today-value.empty { color: var(--text-faint); font-size: 22px; font-weight: 500; }
.today-sub { font-size: 12px; color: var(--text-dim); margin-top: 10px; }
.today-sub.hit { color: var(--green); } .today-sub.miss { color: var(--text-faint); }
.today-cta { margin-top: 16px; background: var(--gold); color: #241a06; border: none; padding: 11px 22px; border-radius: 11px; font-weight: 700; font-size: 13.5px; cursor: pointer; }
.today-cta:active { transform: scale(0.97); }

.dash-link { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 15px 17px; margin-bottom: 14px; cursor: pointer; color: var(--text); font-size: 13.5px; font-weight: 500; }
.dash-link:hover { background: var(--card-hover); }
.dash-link svg { width: 16px; height: 16px; color: var(--text-faint); }
.backup-banner { background: var(--red-dim); border: 1px solid rgba(232,97,92,0.35); border-radius: 14px; padding: 13px 15px; margin-bottom: 14px; cursor: pointer; }
.backup-banner .bb-title { font-size: 13px; font-weight: 600; color: #ff9d98; }
.backup-banner .bb-sub { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; }
.dd-banner { background: rgba(232,97,92,0.16); border: 1px solid rgba(232,97,92,0.4); border-radius: 14px; padding: 13px 15px; margin-bottom: 14px; cursor: pointer; }
.dd-banner .bb-title { font-size: 13px; font-weight: 700; color: #ff9d98; }
.dd-banner .bb-sub { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; }

.settings-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 15px 17px; margin-bottom: 12px; }
.settings-row { display: flex; justify-content: space-between; align-items: center; }
.settings-label { font-size: 13px; color: var(--text); font-weight: 500; }
.settings-sub2 { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.settings-val { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--gold); }
.settings-btn { background: var(--gold-dim); color: var(--gold); border: none; padding: 8px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
.export-btn { width: 100%; background: var(--gold); color: #241a06; border: none; padding: 13px; border-radius: 11px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 10; padding: 20px; }
.overlay.show { display: flex; }
.modal { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; width: 100%; max-width: 320px; max-height: 88vh; overflow-y: auto; }
.modal h3 { margin: 0 0 4px; font-family: 'Space Grotesk', sans-serif; font-size: 16px; }
.modal .sub { font-size: 12px; color: var(--text-faint); margin-bottom: 14px; }
.field-label { font-size: 11.5px; color: var(--text-dim); margin-bottom: 6px; display: block; }
.toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
.toggle-row button { flex: 1; padding: 9px; border-radius: 9px; border: 1px solid var(--line); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500; }
.toggle-row button.active.gain { background: var(--green-dim); color: var(--green); border-color: var(--green); }
.toggle-row button.active.loss { background: var(--red-dim); color: var(--red); border-color: var(--red); }
.modal input[type=text], .modal textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); border-radius: 9px; padding: 10px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 15px; margin-bottom: 12px; }
.modal textarea { font-family: 'Inter', sans-serif; font-size: 13px; resize: none; height: 60px; }
.modal input[type=text]:focus, .modal textarea:focus { outline: none; border-color: var(--gold); }
.modal-actions { display: flex; gap: 8px; }
.modal-actions button { flex: 1; padding: 10px; border-radius: 9px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-save { background: var(--gold); color: #241a06; }
.btn-del { background: rgba(255,255,255,0.06); color: var(--text-dim); }
.btn-cancel { background: transparent; color: var(--text-faint); }
.loading { text-align: center; padding: 60px 0; color: var(--text-faint); font-size: 13px; }

.lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.lock-title { font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.lock-sub { font-size: 12.5px; color: var(--text-faint); margin-bottom: 30px; }
.lock-dots { display: flex; gap: 16px; margin-bottom: 36px; }
.lock-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--text-faint); transition: background 0.1s; }
.lock-dot.filled { background: var(--gold); border-color: var(--gold); }
.lock-dots.shake { animation: shakex 0.4s; }
.lock-dots.shake .lock-dot.filled { background: var(--red); border-color: var(--red); }
@keyframes shakex { 10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(4px);} 30%,50%,70%{transform:translateX(-8px);} 40%,60%{transform:translateX(8px);} }
.lock-pad { display: grid; grid-template-columns: repeat(3, 68px); gap: 16px; }
.lock-key { width: 68px; height: 68px; border-radius: 50%; background: var(--card); border: 1px solid var(--line); color: var(--text); font-size: 22px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.lock-key:active { background: var(--card-hover); }
.lock-key.empty { visibility: hidden; }
</style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<div class="app" id="app">
  <div class="loading" id="loading">Chargement du journal…</div>
</div>

<div class="fab"><button onclick="quickAddToday()" aria-label="Ajouter le résultat d'aujourd'hui">+</button></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalDay">Jour</h3>
    <div class="sub">Résultat du jour</div>
    <div class="toggle-row">
      <button id="btnGain" class="gain">Gain</button>
      <button id="btnLoss" class="loss">Perte</button>
    </div>
    <label class="field-label">Montant net (€)</label>
    <input type="text" inputmode="decimal" id="amountInput" placeholder="ex: 4,92" />
    <label class="field-label">Note (optionnel)</label>
    <textarea id="noteInput" placeholder="ex: bot a doublé la taille après 2 pertes"></textarea>
    <div class="modal-actions">
      <button class="btn-del" id="btnDelete" style="display:none">Supprimer</button>
      <button class="btn-cancel" id="btnCancel">Annuler</button>
      <button class="btn-save" id="btnSave">Enregistrer</button>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h3 id="settingsTitle">Réglages</h3>
    <div class="sub" id="settingsSub">Modifie la valeur</div>
    <input type="text" inputmode="decimal" id="settingsInput" placeholder="Montant en €" />
    <div class="modal-actions">
      <button class="btn-cancel" id="settingsCancel">Annuler</button>
      <button class="btn-save" id="settingsSave">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const MONTHS_SHORT_FR = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

function lsGet(key){ try { return localStorage.getItem(key); } catch(e) { return null; } }
function lsSet(key, val){ try { localStorage.setItem(key, val); return true; } catch(e) { return false; } }
function lsListPrefix(prefix){
  const keys = [];
  try { for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k && k.startsWith(prefix)) keys.push(k); } } catch(e) {}
  return keys;
}

function monthKey(y,m){ return 'month:'+y+'-'+(m+1); }

function migrateEntry(raw){
  if (typeof raw === 'number') return { pnl: raw, note: '' };
  return { pnl: raw.pnl || 0, note: raw.note || '' };
}
function migrateData(obj){
  const out = {};
  for (const k in obj) out[k] = migrateEntry(obj[k]);
  return out;
}

let firstUseAt = null;
let drawdownThresholdPct = 15;

async function loadSettings(){
  const v = lsGet('settings');
  if (v) {
    const s = JSON.parse(v);
    startingCapital = s.startingCapital ?? 300;
    forecastTargetPct = s.forecastTargetPct ?? 2;
    lastExportAt = s.lastExportAt ?? null;
    firstUseAt = s.firstUseAt ?? null;
    drawdownThresholdPct = s.drawdownThresholdPct ?? 15;
    accessPin = s.accessPin ?? null;
    return true;
  }
  return false;
}
async function saveSettings(){ lsSet('settings', JSON.stringify({startingCapital, forecastTargetPct, lastExportAt, firstUseAt, drawdownThresholdPct, accessPin})); }
async function loadMonth(y, m){
  const v = lsGet(monthKey(y, m));
  return v ? migrateData(JSON.parse(v)) : {};
}

async function getAllTimeTotal(){
  let total = 0;
  for (const k of lsListPrefix('month:')) {
    const v = lsGet(k);
    if (v) { const d = migrateData(JSON.parse(v)); total += Object.values(d).reduce((a,e)=>a+e.pnl,0); }
  }
  return total;
}
async function getAllTimeStats(){
  let total = 0, count = 0;
  for (const k of lsListPrefix('month:')) {
    const v = lsGet(k);
    if (v) { const d = migrateData(JSON.parse(v)); const vals = Object.values(d).map(e=>e.pnl); total += vals.reduce((a,b)=>a+b,0); count += vals.length; }
  }
  return { total, count, avgDaily: count ? total/count : 0 };
}
async function getYearMonths(year){
  const months = [];
  for (let m = 0; m < 12; m++) {
    const d = await loadMonth(year, m);
    const total = Object.values(d).reduce((a,e)=>a+e.pnl,0);
    months.push({ idx: m, data: d, total, count: Object.keys(d).length });
  }
  return months;
}

function fmtEUR(n){
  const abs = Math.abs(n);
  const s = abs.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2});
  return (n > 0 ? '+' : n < 0 ? '-' : '') + s + ' €';
}
function fmtEURplain(n){ return n.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €'; }
function daysSinceBackup(){
  const ref = lastExportAt || firstUseAt || Date.now();
  return Math.floor((Date.now() - ref) / 86400000);
}

}

async function computeAllTimeDrawdown(){
  const keys = lsListPrefix('month:');
  const parsed = keys.map(k => {
    const [y, m] = k.replace('month:','').split('-').map(Number);
    return { key: k, y, m: m - 1 };
  }).sort((a,b) => a.y - b.y || a.m - b.m);
  let cum = startingCapital, peak = startingCapital;
  for (const { key } of parsed) {
    const v = lsGet(key);
    if (!v) continue;
    const data = migrateData(JSON.parse(v));
    const days = Object.keys(data).map(Number).sort((a,b) => a - b);
    for (const d of days) { cum += data[d].pnl; if (cum > peak) peak = cum; }
  }
  const ddPct = peak > 0 ? ((peak - cum) / peak) * 100 : 0;
  return { currentCapital: cum, peak, ddPct };
}

function drawdownBannerHTML(dd){
  if (dd.ddPct < drawdownThresholdPct) return '';
  return `<div class="dd-banner" onclick="setPage('settings')">

  </div>`;
}
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function firstWeekdayMon(y,m){ const d = new Date(y,m,1).getDay(); return d === 0 ? 6 : d - 1; }
function isWeekendDay(y,m,d){ const wd = new Date(y,m,d).getDay(); return wd === 0 || wd === 6; }
function weekdaysInMonthCount(y,m){ let c = 0; const dim = daysInMonth(y,m); for (let d=1; d<=dim; d++) if (!isWeekendDay(y,m,d)) c++; return c; }

function computeKPIs(data){
  const entries = Object.entries(data).map(([d,e])=>({day:+d, val:e.pnl, note:e.note})).sort((a,b)=>a.day-b.day);
  const vals = entries.map(e=>e.val);
  const gains = vals.filter(v=>v>0);
  const losses = vals.filter(v=>v<0).map(v=>Math.abs(v));
  const sumGains = gains.reduce((a,b)=>a+b,0);
  const sumLosses = losses.reduce((a,b)=>a+b,0);
  const total = sumGains - sumLosses;
  const winRateFrac = vals.length ? gains.length/vals.length : 0;
  const profitFactor = sumLosses > 0 ? sumGains/sumLosses : (sumGains > 0 ? null : 0);
  const avgWin = gains.length ? sumGains/gains.length : 0;
  const avgLoss = losses.length ? sumLosses/losses.length : 0;
  const expectancy = winRateFrac*avgWin - (1-winRateFrac)*avgLoss;
  let cum = 0, peak = 0, maxDD = 0;
  const curve = [];
  for (const e of entries) { cum += e.val; curve.push({day: e.day, cum}); if (cum > peak) peak = cum; const dd = peak - cum; if (dd > maxDD) maxDD = dd; }
  let streak = 0, streakSign = 0;
  for (let i = entries.length-1; i >= 0; i--) { const s = entries[i].val >= 0 ? 1 : -1; if (streak === 0) { streak = 1; streakSign = s; } else if (s === streakSign) streak++; else break; }
  const best = vals.length ? Math.max(...vals) : null;
  const worst = vals.length ? Math.min(...vals) : null;
  return {entries, vals, total, winRateFrac, profitFactor, avgWin, avgLoss, expectancy, maxDD, curve, streak, streakSign, best, worst};
}

function renderCurve(curve){
  if (curve.length < 2) return `<div class="curve-empty">Ajoute au moins 2 jours pour voir la courbe</div>`;
  const w = 400, h = 90, pad = 6;
  const cums = curve.map(c=>c.cum);
  const min = Math.min(0, ...cums), max = Math.max(0, ...cums);
  const range = (max - min) || 1;
  const stepX = (w - pad*2) / (curve.length - 1);
  const pts = curve.map((c,i) => { const x = pad + i*stepX; const y = h - pad - ((c.cum - min) / range) * (h - pad*2); return [x,y]; });
  const line = pts.map(p=>p.join(',')).join(' ');
  const areaPath = `M${pts[0][0]},${h-pad} L` + line.replace(/ /g,' L') + ` L${pts[pts.length-1][0]},${h-pad} Z`;
  const last = curve[curve.length-1].cum;
  const color = last >= 0 ? '#34c98e' : '#e8615c';
  const gradId = 'g' + Math.random().toString(36).slice(2,8);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:70px;display:block">
    <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.35"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${areaPath}" fill="url(#${gradId})"/>
    <polyline class="curve-draw" points="${line}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="3" fill="${color}" style="animation: fadeUp 0.3s ease 0.9s both"/>
  </svg>`;
}

function computeMonthGoal(kpi, currentCapital, y, m){
  const capitalStartOfMonth = currentCapital - kpi.total;
  const weekdaysCount = weekdaysInMonthCount(y ?? viewYear, m ?? viewMonth);
  const goal = capitalStartOfMonth > 0 ? capitalStartOfMonth * (Math.pow(1 + forecastTargetPct/100, weekdaysCount) - 1) : 0;
  const pct = goal !== 0 ? (kpi.total/goal)*100 : 0;
  return { goal, pct: Math.max(0, Math.min(100, pct)), pctRaw: pct, crushed: kpi.total >= goal && goal > 0, capitalStartOfMonth };
}

async function computeTodayInfo(){
  const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
  const data = await loadMonth(y, m);
  const kpi = computeKPIs(data);
  const allTimeTotal = await getAllTimeTotal();
  const currentCapital = startingCapital + allTimeTotal;
  const goalInfo = computeMonthGoal(kpi, currentCapital, y, m);
  const dim = daysInMonth(y, m);
  let remainingDays = 0;
  for (let dd = d; dd <= dim; dd++) if (!isWeekendDay(y, m, dd)) remainingDays++;
  const targetFinalCapital = goalInfo.capitalStartOfMonth + goalInfo.goal;
  let dailyRate = 0;
  if (remainingDays > 0 && currentCapital > 0 && targetFinalCapital > currentCapital) {
    dailyRate = Math.pow(targetFinalCapital / currentCapital, 1/remainingDays) - 1;
  }
  const isWknd = isWeekendDay(y, m, d);
  const todayTarget = (!isWknd && dailyRate > 0) ? currentCapital * dailyRate : 0;
  return { entry: data[d], todayTarget, isWknd };
}

      sub = `<div class="today-sub ${hit?'hit':'miss'}">${hit?'✓ Objectif du jour atteint':'Objectif du jour'} (~${fmtEURplain(info.todayTarget)})</div>`;

}

function compoundCurve(capital0, pct, days, sampleCount){
  const pts = [];
  const step = Math.max(1, Math.round(days/sampleCount));
  for (let d = 0; d <= days; d += step) pts.push(capital0 * Math.pow(1 + pct/100, d));
  if (pts.length && (days % step !== 0)) pts.push(capital0 * Math.pow(1 + pct/100, days));
  return pts;
}

function renderForecastChart(targetPts, realPts){
  const w = 400, h = 100, pad = 6;
  const all = targetPts.concat(realPts);
  const min = Math.min(...all), max = Math.max(...all);
  const range = (max - min) || 1;
  const toPath = (pts) => pts.map((v,i) => {
    const x = pad + (i/(pts.length-1)) * (w - pad*2);
    const y = h - pad - ((v - min)/range) * (h - pad*2);
    return [x,y];
  });
  const targetXY = toPath(targetPts);
  const realXY = toPath(realPts);
  const line = (xy, color) => `<polyline points="${xy.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:80px;display:block">
    ${line(realXY, '#8a8f98')}
    ${line(targetXY, '#d9a94f')}
  </svg>`;
}

async function renderForecastCard(currentCapital){
  const stats = await getAllTimeStats();
  const realDailyPct = startingCapital > 0 ? (stats.avgDaily/startingCapital)*100 : 0;
  const days = forecastHorizonDays;
  const targetPts = compoundCurve(currentCapital, forecastTargetPct, days, 40);
  const realPts = compoundCurve(currentCapital, realDailyPct, days, 40);
  const targetFinal = targetPts[targetPts.length-1];
  const realFinal = realPts[realPts.length-1];
  const months = Math.round(days/21);
  return `
    <div class="section-label">Prévisionnel</div>
    <div class="forecast-card">
      <div class="forecast-head"><span class="goal-label">Objectif : ${forecastTargetPct}%/jour composé</span></div>
      <div class="forecast-pills">
        <button class="${forecastHorizonDays===21?'active':''}" onclick="setForecastHorizon(21)">1 mois</button>
        <button class="${forecastHorizonDays===63?'active':''}" onclick="setForecastHorizon(63)">3 mois</button>
        <button class="${forecastHorizonDays===126?'active':''}" onclick="setForecastHorizon(126)">6 mois</button>
      </div>
      <div class="forecast-legend">
        <span><i style="background:#d9a94f"></i>Objectif (${forecastTargetPct}%/j)</span>
        <span><i style="background:#8a8f98"></i>Ton rythme réel (${realDailyPct>=0?'+':''}${realDailyPct.toFixed(2)}%/j)</span>
      </div>
      ${renderForecastChart(targetPts, realPts)}
      <div class="forecast-rows">
        <div class="forecast-row"><span class="fl">Objectif dans ~${months} mois</span><span class="fv" style="color:var(--gold)">${fmtEURplain(targetFinal)}</span></div>
        <div class="forecast-row"><span class="fl">À ton rythme réel dans ~${months} mois</span><span class="fv" style="color:${realFinal>=currentCapital?'var(--green)':'var(--red)'}">${fmtEURplain(realFinal)}</span></div>
      </div>
      <div class="forecast-warn">Scénario théorique à titre indicatif, pas une prévision fiable. ${forecastTargetPct}%/jour composé pendant ${months} mois suppose un rendement constant, sans tenir compte des séries de pertes — un rythme rarement soutenu dans la durée, en particulier avec une stratégie grid/martingale où un seul mauvais mouvement peut effacer plusieurs mois de gains.</div>
    </div>
  `;
}

async function renderMonth(){
  const kpi = computeKPIs(monthData);
  const allTimeTotal = await getAllTimeTotal();
  const currentCapital = startingCapital + allTimeTotal;
  const goalInfo = computeMonthGoal(kpi, currentCapital);
  const goal = goalInfo.goal;

  const dim = daysInMonth(viewYear, viewMonth);
  const startOffset = firstWeekdayMon(viewYear, viewMonth);
  const isCurrentMonth = viewYear === today.getFullYear() && viewMonth === today.getMonth();
  const maxAbsMonth = Math.max(1, ...kpi.vals.map(v=>Math.abs(v)), 1);
  const targetFinalCapital = goalInfo.capitalStartOfMonth + goal;
  let remainingDays = 0;
  if (isCurrentMonth) {
    for (let d = today.getDate(); d <= dim; d++) if (!isWeekendDay(viewYear, viewMonth, d)) remainingDays++;
  }
  let dailyRate = 0;
  if (remainingDays > 0 && currentCapital > 0 && targetFinalCapital > currentCapital) {
    dailyRate = Math.pow(targetFinalCapital / currentCapital, 1/remainingDays) - 1;
  }
  const dayTargets = {};
  if (dailyRate > 0) {
    let tradingIndex = 0;
    for (let d = today.getDate(); d <= dim; d++) {
      if (isWeekendDay(viewYear, viewMonth, d)) continue;
      const capBeforeDay = currentCapital * Math.pow(1 + dailyRate, tradingIndex);
      dayTargets[d] = capBeforeDay * dailyRate;
      tradingIndex++;
    }
  }

  let cells = '';
  for (let i=0; i<startOffset; i++) cells += '<div class="cell out"></div>';
  for (let d=1; d<=dim; d++){
    const entry = monthData[d];
    const has = entry !== undefined;
    const val = has ? entry.pnl : 0;
    const isToday = isCurrentMonth && d === today.getDate();
    const noteDot = (has && entry.note) ? `<div class="note-dot"></div>` : '';
    const isWknd = isWeekendDay(viewYear, viewMonth, d);
    const showTarget = !has && isCurrentMonth && dayTargets[d] !== undefined;
    let content, cellStyle = '';
    if (has) {
      const intensity = 0.14 + 0.5 * (Math.abs(val)/maxAbsMonth);
      const tint = val >= 0 ? `rgba(52,201,142,${intensity})` : `rgba(232,97,92,${intensity})`;
      const textColor = val >= 0 ? '#5eeab0' : '#ff9d98';
      content = `<span class="p" style="color:${textColor}">${fmtEUR(val)}</span>`;
      cellStyle = ` style="background:${tint}"`;
    }
    else if (isWknd) content = `<span class="closed">Fermé</span>`;
    else if (showTarget) content = `<span class="tgt">~${fmtEURplain(dayTargets[d])}</span>`;
    else content = '';
    cells += `<div class="cell ${has?'filled':(isWknd?'weekend':'empty')} ${isToday?'today':''}"${cellStyle} onclick="openDay(${d})">
      ${noteDot}
      <span class="d">${d}</span>
      ${content}
    </div>`;
  }

  document.getElementById('app').innerHTML = `
    ${headerHTML()}
    <div class="view-toggle">
      <button class="active" onclick="setViewMode('month')">Mois</button>
      <button onclick="setViewMode('year')">Année</button>
    </div>
    <div class="nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label">${MONTHS_FR[viewMonth]} ${viewYear}</span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    ${goalCardHTML(kpi, goalInfo)}
    <div class="weekdays">${DAYS_FR.map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="grid">${cells}</div>
    ${(isCurrentMonth && dailyRate > 0) ? `<div style="font-size:11px;color:var(--text-faint);margin:-8px 0 16px;text-align:center">En or : objectif quotidien composé (${(dailyRate*100).toFixed(2)}%/jour) pour atteindre ton but</div>` : ''}
  `;
}

async function renderYear(){
  const months = await getYearMonths(viewYear);
  const allEntries = [];
  months.forEach(m => { Object.entries(m.data).forEach(([d,e]) => allEntries.push(e.pnl)); });
  const total = allEntries.reduce((a,b)=>a+b,0);
  const wins = allEntries.filter(v=>v>0).length;
  const winRate = allEntries.length ? Math.round((wins/allEntries.length)*100) : 0;
  const monthsWithData = months.filter(m=>m.count>0);
  const bestMonth = monthsWithData.length ? monthsWithData.reduce((a,b)=>b.total>a.total?b:a) : null;

  const monthCards = months.map(m => {
    const isCurrent = viewYear === today.getFullYear() && m.idx === today.getMonth();
    return `<div class="mcard ${isCurrent?'current':''}" onclick="jumpToMonth(${m.idx})">
      <div class="mname">${MONTHS_SHORT_FR[m.idx]}</div>
      <div class="mval ${m.count===0?'empty':(m.total>=0?'pos':'neg')}" style="${m.count>0?`color:${m.total>=0?'var(--green)':'var(--red)'}`:''}">${m.count>0?fmtEUR(m.total):'—'}</div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    ${headerHTML()}
    <div class="view-toggle">
      <button onclick="setViewMode('month')">Mois</button>
      <button class="active" onclick="setViewMode('year')">Année</button>
    </div>
    <div class="nav">
      <button onclick="changeYear(-1)">‹</button>
      <span class="month-label">${viewYear}</span>
      <button onclick="changeYear(1)">›</button>
    </div>
    <div class="year-stats">
      <div class="kpi"><div class="kpi-label">P&L annuel</div><div class="kpi-val ${total>=0?'pos':'neg'}" style="margin-top:6px">${fmtEUR(total)}</div></div>
      <div class="kpi"><div class="kpi-label">Taux de réussite</div><div class="kpi-val" style="margin-top:6px">${winRate}%</div></div>
      <div class="kpi"><div class="kpi-label">Meilleur mois</div><div class="kpi-val pos" style="margin-top:6px">${bestMonth?fmtEUR(bestMonth.total):'—'}</div></div>
    </div>
    <div class="section-label">Détail par mois</div>
    <div class="year-months">${monthCards}</div>
  `;
}

async function exportCSV(){
  const rows = [['Date','Résultat net (€)','Note']];
  const keys = lsListPrefix('month:').sort();
  for (const k of keys) {
    const parts = k.replace('month:','').split('-');
    const y = parseInt(parts[0]), m = parseInt(parts[1]);
    const v = lsGet(k);
    if (!v) continue;
    const data = migrateData(JSON.parse(v));
    const days = Object.keys(data).map(x=>parseInt(x)).sort((a,b)=>a-b);
    for (const d of days) {
      const e = data[d];
      const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      rows.push([dateStr, e.pnl.toFixed(2).replace('.',','), (e.note||'').replace(/;/g,',')]);
    }
  }
  const csv = rows.map(r => r.join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'journal-trading-export.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  lastExportAt = Date.now();
  await saveSettings();
  render();
}

let pinBuffer = '';
function buildLockScreen(){
  const wrap = document.createElement('div');
  wrap.innerHTML = `<div class="lock-screen" id="lockScreen">
    <div class="lock-title">Journal de trading</div>
    <div class="lock-sub">Entre ton code à 4 chiffres</div>
    <div class="lock-dots" id="lockDots">${[0,1,2,3].map(()=>'<div class="lock-dot"></div>').join('')}</div>
    <div class="lock-pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="lock-key" onclick="pinPress(${n})">${n}</button>`).join('')}
      <div class="lock-key empty"></div>
      <button class="lock-key" onclick="pinPress(0)">0</button>
      <button class="lock-key" onclick="pinBackspace()">⌫</button>
    </div>
  </div>`;
  document.body.appendChild(wrap.firstElementChild);
}
function updateLockDots(){
  document.querySelectorAll('#lockDots .lock-dot').forEach((d,i)=> d.classList.toggle('filled', i < pinBuffer.length));
}
function pinPress(n){
  if (pinBuffer.length >= 4) return;
  pinBuffer += n;
  updateLockDots();
  if (pinBuffer.length === 4) checkPin();
}
function pinBackspace(){ pinBuffer = pinBuffer.slice(0,-1); updateLockDots(); }
function checkPin(){
  if (pinBuffer === accessPin) {
    const el = document.getElementById('lockScreen');
    if (el) el.remove();
    render();
  } else {
    const dotsEl = document.getElementById('lockDots');
    dotsEl.classList.add('shake');
    setTimeout(()=>{ dotsEl.classList.remove('shake'); pinBuffer=''; updateLockDots(); }, 400);
  }
}

(async function init(){
  const hadSettings = await loadSettings();
  if (!hadSettings) { startingCapital = 300; forecastTargetPct = 2; firstUseAt = Date.now(); await saveSettings(); }

    await saveMonth();
  }
  if (accessPin) { buildLockScreen(); } else { render(); }
})();
