<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Journal Trading">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c0f">
<title>Journal de trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  html, body { background: #0a0c0f; margin: 0; padding: 0; }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
</style>
<style>
  :root {
    --bg: #0a0c0f;
    --card: #14171c;
    --card-hover: #1a1e24;
    --line: rgba(255,255,255,0.07);
    --gold: #d9a94f;
    --gold-dim: rgba(217,169,79,0.14);
    --green: #34c98e;
    --green-dim: rgba(52,201,142,0.13);
    --red: #e8615c;
    --red-dim: rgba(232,97,92,0.13);
    --text: #eef0f2;
    --text-dim: #8a8f98;
    --text-faint: #4d5158;
  }
  * { box-sizing: border-box; }
  body { margin: 0; }
  .app {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 26px 18px 44px;
    min-height: 100vh;
  }
  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .brand h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .brand .ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--gold);
    background: var(--gold-dim);
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 0.04em;
  }
  .section-label {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 9px 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .capital-card {
    background: radial-gradient(120% 140% at 0% 0%, #201a0c 0%, #14171c 55%);
    border: 1px solid rgba(217,169,79,0.28);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 14px;
    position: relative;
  }
  .capital-card .edit-cap {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 11.5px;
  }
  .capital-card .edit-cap:hover { color: var(--gold); }
  .cap-label {
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .cap-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 29px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .cap-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .cap-sub .pos { color: var(--green); }
  .cap-sub .neg { color: var(--red); }

  .curve-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 16px 10px;
    margin-bottom: 14px;
  }
  .curve-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .curve-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .curve-now { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; }
  .curve-empty { text-align: center; padding: 24px 0; color: var(--text-faint); font-size: 12.5px; }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 18px 0 14px;
  }
  .nav button {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav button:hover { background: var(--card-hover); }
  .nav .month-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15.5px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .goal-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 15px 17px;
    margin-bottom: 14px;
  }
  .goal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
  .goal-label { font-size: 11.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .goal-edit { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 12.5px; padding: 2px 6px; }
  .goal-edit:hover { color: var(--gold); }
  .goal-track { height: 7px; border-radius: 5px; background: rgba(255,255,255,0.06); overflow: hidden; margin-bottom: 9px; }
  .goal-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #b9862f, var(--gold)); transition: width 0.4s ease; }
  .goal-fill.neg { background: linear-gradient(90deg, #8a2f2c, var(--red)); }
  .goal-nums { display: flex; align-items: baseline; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; }
  .goal-nums .cur { font-size: 18px; font-weight: 600; }
  .goal-nums .cur.pos { color: var(--green); }
  .goal-nums .cur.neg { color: var(--red); }
  .goal-nums .target { font-size: 11.5px; color: var(--text-faint); }
  .goal-banner { margin-top: 11px; background: var(--gold-dim); border-radius: 9px; padding: 8px 11px; font-size: 12px; color: var(--gold); }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 6px; }
  .weekdays span { text-align: center; font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.03em; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 16px; }
  .cell {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: transform 0.1s, border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .cell:active { transform: scale(0.94); }
  .cell.out { visibility: hidden; }
  .cell .d { font-size: 11px; color: var(--text-faint); font-family: 'Inter', sans-serif; }
  .cell.filled .d { color: rgba(255,255,255,0.5); }
  .cell .p { font-size: 9.5px; font-weight: 600; line-height: 1.1; text-align: center; padding: 0 2px; }
  .cell.empty { background: var(--card); border-color: var(--line); }
  .cell.empty:hover { background: var(--card-hover); }
  .cell.today { border-color: var(--gold); }
  .badge {
    position: absolute; top: 2px; right: 3px;
    width: 12px; height: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .badge svg { width: 100%; height: 100%; }

  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
  .kpi {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 13px;
  }
  .kpi-top { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .kpi-top svg { width: 14px; height: 14px; color: var(--text-faint); flex-shrink: 0; }
  .kpi-label { font-size: 10.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi-val { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; }
  .kpi-val.pos { color: var(--green); }
  .kpi-val.neg { color: var(--red); }
  .kpi-sub { font-size: 10.5px; color: var(--text-faint); margin-top: 2px; }

  .bars { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 15px 17px 10px; margin-bottom: 14px; }
  .bars-row { display: flex; align-items: flex-end; gap: 3px; height: 48px; }
  .bar { flex: 1; background: var(--text-faint); border-radius: 2px; min-height: 2px; }
  .bar.pos { background: var(--green); }
  .bar.neg { background: var(--red); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 10; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; width: 100%; max-width: 300px; }
  .modal h3 { margin: 0 0 4px; font-family: 'Space Grotesk', sans-serif; font-size: 16px; }
  .modal .sub { font-size: 12px; color: var(--text-faint); margin-bottom: 16px; }
  .toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .toggle-row button { flex: 1; padding: 9px; border-radius: 9px; border: 1px solid var(--line); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500; }
  .toggle-row button.active.gain { background: var(--green-dim); color: var(--green); border-color: var(--green); }
  .toggle-row button.active.loss { background: var(--red-dim); color: var(--red); border-color: var(--red); }
  .modal input[type=text] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); border-radius: 9px; padding: 11px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 16px; margin-bottom: 14px; }
  .modal input[type=text]:focus { outline: none; border-color: var(--gold); }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 9px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-save { background: var(--gold); color: #241a06; }
  .btn-del { background: rgba(255,255,255,0.06); color: var(--text-dim); }
  .btn-cancel { background: transparent; color: var(--text-faint); }
  .loading { text-align: center; padding: 60px 0; color: var(--text-faint); font-size: 13px; }
</style>
</head>
<body>


<div class="app" id="app">
  <div class="loading" id="loading">Chargement du journal…</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalDay">Jour</h3>
    <div class="sub">Résultat du jour</div>
    <div class="toggle-row">
      <button id="btnGain" class="gain">Gain</button>
      <button id="btnLoss" class="loss">Perte</button>
    </div>
    <input type="text" inputmode="decimal" id="amountInput" placeholder="Montant en € (ex: 4,92)" />
    <div class="modal-actions">
      <button class="btn-del" id="btnDelete" style="display:none">Supprimer</button>
      <button class="btn-cancel" id="btnCancel">Annuler</button>
      <button class="btn-save" id="btnSave">Enregistrer</button>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h3 id="settingsTitle">Réglages</h3>
    <div class="sub" id="settingsSub">Modifie la valeur</div>
    <input type="text" inputmode="decimal" id="settingsInput" placeholder="Montant en €" />
    <div class="modal-actions">
      <button class="btn-cancel" id="settingsCancel">Annuler</button>
      <button class="btn-save" id="settingsSave">Enregistrer</button>
    </div>
  </div>
</div>


<script>
function lsGet(key){
  try { const v = localStorage.getItem(key); return v; } catch(e) { return null; }
}
function lsSet(key, val){
  try { localStorage.setItem(key, val); return true; } catch(e) { return false; }
}
function lsListPrefix(prefix){
  const keys = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) keys.push(k);
    }
  } catch(e) {}
  return keys;
}

const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

const ICONS = {
  target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.6" fill="currentColor"/></svg>',
  scale: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18M6 7h12M4 7l2.5 5.5a2.5 2.5 0 0 0 5 0L14 7M14 7l2.5 5.5a2.5 2.5 0 0 0 5 0L24 7"/></svg>',
  trendUp: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 17l6-6 4 4 8-9"/><path d="M15 6h6v6"/></svg>',
  trendDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7l6 6 4-4 8 9"/><path d="M15 18h6v-6"/></svg>',
  waves: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 15c2-3 4-3 6 0s4 3 6 0 4-3 6 0"/></svg>',
  flame: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3s4 3.5 4 7.5a4 4 0 0 1-8 0c0-1 .3-1.8.8-2.6C9.3 9.5 9 11 9 12a3 3 0 0 0 6 0c0-3.5-3-6-3-9z"/><path d="M7 15a5 5 0 0 0 10 0c0-1.5-.5-2.8-1.3-4"/></svg>',
  crown: '<svg viewBox="0 0 24 24" fill="none" stroke="#d9a94f" stroke-width="1.8" stroke-linejoin="round"><path d="M3 8l4 3 5-6 5 6 4-3-2 9H5z"/></svg>',
  drop: '<svg viewBox="0 0 24 24" fill="none" stroke="#e8615c" stroke-width="1.8" stroke-linejoin="round"><path d="M12 4c3 4 6 7.5 6 11a6 6 0 0 1-12 0c0-3.5 3-7 6-11z"/></svg>'
};

let today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let goal = 1500;
let startingCapital = 300;
let monthData = {};
let sign = 'gain';

function monthKey(y,m){ return 'month:'+y+'-'+(m+1); }

async function loadSettings(){
  const v = lsGet('settings');
  if (v) {
    const s = JSON.parse(v);
    goal = s.goal ?? 1500;
    startingCapital = s.startingCapital ?? 300;
    return true;
  }
  return false;
}
async function saveSettings(){
  lsSet('settings', JSON.stringify({goal, startingCapital}));
}
async function loadMonth(y, m){
  const v = lsGet(monthKey(y, m));
  return v ? JSON.parse(v) : {};
}
async function saveMonth(){
  lsSet(monthKey(viewYear, viewMonth), JSON.stringify(monthData));
}
async function getAllTimeTotal(){
  let total = 0;
  const keys = lsListPrefix('month:');
  for (const k of keys) {
    const v = lsGet(k);
    if (v) total += Object.values(JSON.parse(v)).reduce((a,b)=>a+b,0);
  }
  return total;
}

function fmtEUR(n){
  const abs = Math.abs(n);
  const s = abs.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2});
  return (n > 0 ? '+' : n < 0 ? '-' : '') + s + ' €';
}
function fmtEURplain(n){ return n.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €'; }
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function firstWeekdayMon(y,m){ const d = new Date(y,m,1).getDay(); return d === 0 ? 6 : d - 1; }

function computeKPIs(data){
  const entries = Object.entries(data).map(([d,v])=>({day:+d, val:v})).sort((a,b)=>a.day-b.day);
  const vals = entries.map(e=>e.val);
  const gains = vals.filter(v=>v>0);
  const losses = vals.filter(v=>v<0).map(v=>Math.abs(v));
  const sumGains = gains.reduce((a,b)=>a+b,0);
  const sumLosses = losses.reduce((a,b)=>a+b,0);
  const total = sumGains - sumLosses;
  const winRateFrac = vals.length ? gains.length/vals.length : 0;
  const profitFactor = sumLosses > 0 ? sumGains/sumLosses : (sumGains > 0 ? null : 0);
  const avgWin = gains.length ? sumGains/gains.length : 0;
  const avgLoss = losses.length ? sumLosses/losses.length : 0;
  const expectancy = winRateFrac*avgWin - (1-winRateFrac)*avgLoss;
  let cum = 0, peak = 0, maxDD = 0;
  const curve = [];
  for (const e of entries) {
    cum += e.val;
    curve.push({day: e.day, cum});
    if (cum > peak) peak = cum;
    const dd = peak - cum;
    if (dd > maxDD) maxDD = dd;
  }
  let streak = 0, streakSign = 0;
  for (let i = entries.length-1; i >= 0; i--) {
    const s = entries[i].val >= 0 ? 1 : -1;
    if (streak === 0) { streak = 1; streakSign = s; }
    else if (s === streakSign) streak++;
    else break;
  }
  const best = vals.length ? Math.max(...vals) : null;
  const worst = vals.length ? Math.min(...vals) : null;
  const bestDay = entries.find(e=>e.val===best);
  const worstDay = entries.find(e=>e.val===worst);
  return {entries, vals, total, winRateFrac, profitFactor, avgWin, avgLoss, expectancy, maxDD, curve, streak, streakSign, best, worst, bestDay, worstDay};
}

function renderCurve(curve){
  if (curve.length < 2) {
    return `<div class="curve-empty">Ajoute au moins 2 jours pour voir la courbe</div>`;
  }
  const w = 400, h = 90, pad = 6;
  const cums = curve.map(c=>c.cum);
  const min = Math.min(0, ...cums), max = Math.max(0, ...cums);
  const range = (max - min) || 1;
  const stepX = (w - pad*2) / (curve.length - 1);
  const pts = curve.map((c,i) => {
    const x = pad + i*stepX;
    const y = h - pad - ((c.cum - min) / range) * (h - pad*2);
    return [x,y];
  });
  const line = pts.map(p=>p.join(',')).join(' ');
  const areaPath = `M${pts[0][0]},${h-pad} L` + line.replace(/ /g,' L') + ` L${pts[pts.length-1][0]},${h-pad} Z`;
  const last = curve[curve.length-1].cum;
  const color = last >= 0 ? '#34c98e' : '#e8615c';
  const gradId = 'g' + Math.random().toString(36).slice(2,8);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:70px;display:block">
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaPath}" fill="url(#${gradId})"/>
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="3" fill="${color}"/>
  </svg>`;
}

async function render(){
  const kpi = computeKPIs(monthData);
  const allTimeTotal = await getAllTimeTotal();
  const currentCapital = startingCapital + allTimeTotal;
  const roi = startingCapital > 0 ? (allTimeTotal / startingCapital) * 100 : 0;

  const pct = goal !== 0 ? (kpi.total/goal)*100 : 0;
  const pctClamped = Math.max(0, Math.min(100, pct));
  const crushed = kpi.total >= goal && goal > 0;
  const dim = daysInMonth(viewYear, viewMonth);
  const startOffset = firstWeekdayMon(viewYear, viewMonth);
  const isCurrentMonth = viewYear === today.getFullYear() && viewMonth === today.getMonth();
  const maxAbsMonth = Math.max(1, ...kpi.vals.map(v=>Math.abs(v)), 1);

  let cells = '';
  for (let i=0; i<startOffset; i++) cells += '<div class="cell out"></div>';
  for (let d=1; d<=dim; d++){
    const val = monthData[d];
    const has = val !== undefined;
    const isToday = isCurrentMonth && d === today.getDate();
    let bg = '', color = '';
    if (has) {
      const intensity = 0.14 + 0.5 * (Math.abs(val)/maxAbsMonth);
      if (val >= 0) { bg = `rgba(52,201,142,${intensity})`; color = '#eafff5'; }
      else { bg = `rgba(232,97,92,${intensity})`; color = '#fff0ef'; }
    }
    let badge = '';
    if (has && kpi.entries.length > 1) {
      if (val === kpi.best && val > 0) badge = `<div class="badge">${ICONS.crown}</div>`;
      else if (val === kpi.worst && val < 0) badge = `<div class="badge">${ICONS.drop}</div>`;
    }
    cells += `<div class="cell ${has?'filled':'empty'} ${isToday?'today':''}" style="${has?`background:${bg};color:${color}`:''}" onclick="openDay(${d})">
      ${badge}
      <span class="d" style="${has?`color:${color};opacity:0.75`:''}">${d}</span>
      ${has ? `<span class="p">${fmtEUR(val)}</span>` : ''}
    </div>`;
  }

  const barsRow = [];
  for (let d=1; d<=dim; d++){
    const v = monthData[d];
    const h = v ? Math.max(4, Math.round((Math.abs(v)/maxAbsMonth)*40)) : 2;
    barsRow.push(`<div class="bar ${v>0?'pos':v<0?'neg':''}" style="height:${h}px" title="${d}: ${v?fmtEUR(v):'—'}"></div>`);
  }

  const pfDisplay = kpi.profitFactor === null ? '∞' : kpi.profitFactor.toFixed(2);
  const streakLabel = kpi.streak > 0 ? `${kpi.streak} jour${kpi.streak>1?'s':''} ${kpi.streakSign>0?'gagnants':'perdants'}` : 'aucune donnée';

  document.getElementById('app').innerHTML = `
    <div class="brand">
      <h1>Journal de trading</h1>
      <span class="ticker">XAUUSD</span>
    </div>

    <div class="capital-card">
      <button class="edit-cap" onclick="editCapital()">Modifier</button>
      <div class="cap-label">Capital actuel</div>
      <div class="cap-value">${fmtEURplain(currentCapital)}</div>
      <div class="cap-sub"><span class="${allTimeTotal>=0?'pos':'neg'}">${fmtEUR(allTimeTotal)}</span> · ${roi>=0?'+':''}${roi.toFixed(2)}% depuis le départ (${fmtEURplain(startingCapital)})</div>
    </div>

    <div class="curve-card">
      <div class="curve-head">
        <span class="curve-title">Courbe de capital — ${MONTHS_FR[viewMonth]}</span>
        <span class="curve-now ${kpi.total>=0?'pos':'neg'}" style="color:${kpi.total>=0?'var(--green)':'var(--red)'}">${fmtEUR(kpi.total)}</span>
      </div>
      ${renderCurve(kpi.curve)}
    </div>

    <div class="nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label">${MONTHS_FR[viewMonth]} ${viewYear}</span>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="goal-card">
      <div class="goal-top">
        <span class="goal-label">Objectif mensuel</span>
        <button class="goal-edit" onclick="editGoal()">Modifier</button>
      </div>
      <div class="goal-track"><div class="goal-fill ${kpi.total<0?'neg':''}" style="width:${pctClamped}%"></div></div>
      <div class="goal-nums">
        <span class="cur ${kpi.total>=0?'pos':'neg'}">${fmtEUR(kpi.total)}</span>
        <span class="target">sur ${fmtEURplain(goal)}</span>
      </div>
      ${crushed ? `<div class="goal-banner">Objectif atteint — ${Math.round(pct)}% de ta cible</div>` : ''}
    </div>

    <div class="weekdays">${DAYS_FR.map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="grid">${cells}</div>

    <div class="section-label">Indicateurs de performance</div>
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-top">${ICONS.scale}<span class="kpi-label">Profit factor</span></div>
        <div class="kpi-val ${kpi.profitFactor!==null && kpi.profitFactor>=1?'pos':(kpi.profitFactor!==null?'neg':'')}">${kpi.vals.length?pfDisplay:'—'}</div>
        <div class="kpi-sub">gains / pertes</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">${ICONS.target}<span class="kpi-label">Espérance / trade</span></div>
        <div class="kpi-val ${kpi.expectancy>=0?'pos':'neg'}">${kpi.vals.length?fmtEUR(kpi.expectancy):'—'}</div>
        <div class="kpi-sub">gain moyen attendu</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">${ICONS.trendUp}<span class="kpi-label">Gain moyen</span></div>
        <div class="kpi-val pos">${kpi.avgWin?fmtEURplain(kpi.avgWin):'—'}</div>
        <div class="kpi-sub">sur les jours gagnants</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">${ICONS.trendDown}<span class="kpi-label">Perte moyenne</span></div>
        <div class="kpi-val neg">${kpi.avgLoss?fmtEURplain(kpi.avgLoss):'—'}</div>
        <div class="kpi-sub">sur les jours perdants</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">${ICONS.waves}<span class="kpi-label">Drawdown max</span></div>
        <div class="kpi-val ${kpi.maxDD>0?'neg':''}">${kpi.maxDD>0?'-'+fmtEURplain(kpi.maxDD):'—'}</div>
        <div class="kpi-sub">pire creux vs pic</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">${ICONS.flame}<span class="kpi-label">Série actuelle</span></div>
        <div class="kpi-val ${kpi.streakSign>0?'pos':(kpi.streakSign<0?'neg':'')}">${kpi.streak||'—'}</div>
        <div class="kpi-sub">${streakLabel}</div>
      </div>
    </div>

    <div class="bars">
      <div class="section-label" style="margin-bottom:10px">Volatilité quotidienne</div>
      <div class="bars-row">${barsRow.join('')}</div>
    </div>
  `;
}

function changeMonth(delta){
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  loadMonth(viewYear, viewMonth).then(d => { monthData = d; render(); });
}

let settingsField = null;
function editGoal(){
  settingsField = 'goal';
  document.getElementById('settingsTitle').textContent = 'Objectif mensuel';
  document.getElementById('settingsSub').textContent = 'Montant à viser chaque mois';
  document.getElementById('settingsInput').value = goal.toString().replace('.', ',');
  document.getElementById('settingsOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('settingsInput').focus(), 50);
}
function editCapital(){
  settingsField = 'capital';
  document.getElementById('settingsTitle').textContent = 'Capital de départ';
  document.getElementById('settingsSub').textContent = 'Ton capital initial sur le compte';
  document.getElementById('settingsInput').value = startingCapital.toString().replace('.', ',');
  document.getElementById('settingsOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('settingsInput').focus(), 50);
}
document.getElementById('settingsCancel').onclick = ()=> document.getElementById('settingsOverlay').classList.remove('show');
document.getElementById('settingsOverlay').addEventListener('click', (e)=>{ if (e.target.id === 'settingsOverlay') e.target.classList.remove('show'); });
document.getElementById('settingsSave').onclick = async ()=>{
  const raw = document.getElementById('settingsInput').value.replace(',', '.').replace(/\s/g,'');
  const n = parseFloat(raw);
  if (isNaN(n) || n < 0) return;
  if (settingsField === 'goal' && n > 0) goal = n;
  if (settingsField === 'capital') startingCapital = n;
  await saveSettings();
  document.getElementById('settingsOverlay').classList.remove('show');
  render();
};

let activeDay = null;
function openDay(d){
  activeDay = d;
  const existing = monthData[d];
  sign = (existing !== undefined && existing < 0) ? 'perte' : 'gain';
  document.getElementById('modalDay').textContent = `${d} ${MONTHS_FR[viewMonth]}`;
  document.getElementById('amountInput').value = existing !== undefined ? fmtEURplain(Math.abs(existing)).replace(' €','') : '';
  document.getElementById('btnDelete').style.display = existing !== undefined ? 'block' : 'none';
  updateToggle();
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('amountInput').focus(), 50);
}
function updateToggle(){
  document.getElementById('btnGain').classList.toggle('active', sign === 'gain');
  document.getElementById('btnLoss').classList.toggle('active', sign === 'perte');
}
document.getElementById('btnGain').onclick = ()=>{ sign='gain'; updateToggle(); };
document.getElementById('btnLoss').onclick = ()=>{ sign='perte'; updateToggle(); };
document.getElementById('btnCancel').onclick = ()=> document.getElementById('overlay').classList.remove('show');
document.getElementById('btnSave').onclick = async ()=>{
  const raw = document.getElementById('amountInput').value.replace(',', '.').replace(/\s/g,'');
  const n = parseFloat(raw);
  if (isNaN(n) || n < 0) return;
  monthData[activeDay] = Math.round((sign === 'perte' ? -n : n) * 100) / 100;
  await saveMonth();
  document.getElementById('overlay').classList.remove('show');
  render();
};
document.getElementById('btnDelete').onclick = async ()=>{
  delete monthData[activeDay];
  await saveMonth();
  document.getElementById('overlay').classList.remove('show');
  render();
};
document.getElementById('overlay').addEventListener('click', (e)=>{ if (e.target.id === 'overlay') e.target.classList.remove('show'); });

function isCurrentMonthJuly2026(){ return viewYear === 2026 && viewMonth === 6; }

(async function init(){
  const hadSettings = await loadSettings();
  if (!hadSettings) {
    startingCapital = 300;
    goal = 1500;
    await saveSettings();
  }
  monthData = await loadMonth(viewYear, viewMonth);
  if (isCurrentMonthJuly2026() && Object.keys(monthData).length === 0) {
    monthData = { "2": 4.92, "3": -7.61 };
    await saveMonth();
  }
  render();
})();
</script>
</body>
</html>
