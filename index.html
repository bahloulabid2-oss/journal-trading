<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Journal Trading">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c0f">
<title>Journal de trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
html, body { background: #08090c; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(90% 55% at 50% -10%, rgba(224,176,90,0.07) 0%, transparent 60%), radial-gradient(70% 45% at 100% 100%, rgba(61,220,151,0.03) 0%, transparent 55%); pointer-events: none; z-index: 0; }
.app { position: relative; z-index: 1; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
:root {
  --bg: #08090c;
  --card: #12151a;
  --card-hover: #191d24;
  --card-raised: #16191f;
  --line: rgba(255,255,255,0.06);
  --line-strong: rgba(255,255,255,0.12);
  --gold: #e0b05a;
  --gold-soft: #d9a94f;
  --gold-dim: rgba(224,176,90,0.12);
  --green: #3ddc97;
  --green-dim: rgba(61,220,151,0.12);
  --red: #f0655f;
  --red-dim: rgba(240,101,95,0.12);
  --text: #f2f4f6;
  --text-dim: #9aa0a8;
  --text-faint: #545a63;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px -12px rgba(0,0,0,0.5);
  --r-lg: 18px;
  --r-md: 14px;
  --r-sm: 10px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* ---------- Layout ---------- */
.app { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; max-width: 480px; margin: 0 auto; padding: 24px 18px 110px; min-height: 100vh; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes drawline { to { stroke-dashoffset: 0; } }
.fade-in { animation: fadeUp 0.45s cubic-bezier(.22,.9,.35,1) both; }
.app > * { animation: fadeUp 0.4s cubic-bezier(.22,.9,.35,1) both; }
.app > *:nth-child(2) { animation-delay: 0.03s; }
.app > *:nth-child(3) { animation-delay: 0.06s; }
.app > *:nth-child(4) { animation-delay: 0.09s; }
.app > *:nth-child(5) { animation-delay: 0.12s; }
.app > *:nth-child(6) { animation-delay: 0.15s; }
.app > *:nth-child(n+7) { animation-delay: 0.18s; }

/* ---------- Header ---------- */
.brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
.brand-left { display: flex; align-items: center; gap: 12px; }
.logo-mark { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; filter: drop-shadow(0 0 6px rgba(224,176,90,0.3)); }
.logo-mark svg { width: 100%; height: 100%; }
.brand h1 { font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -0.015em; }
.brand-right { display: flex; align-items: center; gap: 8px; }
.brand .ticker { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: var(--gold); background: var(--gold-dim); border: 1px solid rgba(224,176,90,0.22); padding: 4px 9px; border-radius: 7px; letter-spacing: 0.05em; }
.icon-btn, .menu-btn { background: var(--card); border: 1px solid var(--line); color: var(--text-dim); width: 36px; height: 36px; border-radius: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.15s, color 0.15s; }
.icon-btn svg, .menu-btn svg { width: 16px; height: 16px; }
.icon-btn:hover, .menu-btn:hover { color: var(--gold); border-color: rgba(224,176,90,0.4); }
.icon-btn:active, .menu-btn:active { transform: scale(0.93); }

/* ---------- Drawer ---------- */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); display: none; z-index: 40; }
.drawer-overlay.show { display: block; animation: fadeUp 0.2s ease both; }
.drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 78%; max-width: 290px; background: linear-gradient(180deg, #14171d 0%, #0e1116 100%); border-right: 1px solid var(--line-strong); transform: translateX(-105%); transition: transform 0.32s cubic-bezier(.22,.9,.35,1); z-index: 41; padding: 30px 16px; padding-top: calc(30px + env(safe-area-inset-top)); display: flex; flex-direction: column; gap: 4px; box-shadow: 12px 0 40px rgba(0,0,0,0.5); }
.drawer.show { transform: translateX(0); }
.drawer-title { font-family: 'Space Grotesk', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin: 4px 0 16px 12px; }
.drawer-item { display: flex; align-items: center; gap: 13px; padding: 14px 14px; border-radius: 12px; color: var(--text-dim); cursor: pointer; font-size: 14.5px; font-weight: 500; transition: background 0.15s, color 0.15s; }
.drawer-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.drawer-item.active { background: var(--gold-dim); color: var(--gold); box-shadow: inset 0 0 0 1px rgba(224,176,90,0.25); }
.drawer-item:hover:not(.active) { background: var(--card-hover); color: var(--text); }
.drawer-footer { margin-top: auto; padding: 12px 14px; font-size: 10.5px; color: var(--text-faint); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.03em; }

/* ---------- Segmented toggle ---------- */
.view-toggle { display: flex; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow-card); }
.view-toggle button { flex: 1; background: transparent; border: none; color: var(--text-faint); padding: 9px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.18s, color 0.18s; }
.view-toggle button.active { background: var(--card-hover); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.35), inset 0 0 0 1px var(--line-strong); }

/* ---------- Section labels ---------- */
.section-label { font-size: 10.5px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.11em; margin: 4px 0 10px 2px; display: flex; align-items: center; justify-content: space-between; }

/* ---------- Today hero ---------- */
.today-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 24px 20px; margin-bottom: 12px; text-align: center; position: relative; overflow: hidden; box-shadow: var(--shadow-card); }
.today-card::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent); }
.today-card.pos::before { background: linear-gradient(90deg, transparent, rgba(61,220,151,0.55), transparent); }
.today-card.neg::before { background: linear-gradient(90deg, transparent, rgba(240,101,95,0.55), transparent); }
.today-card.pos { border-color: rgba(61,220,151,0.3); background: radial-gradient(130% 150% at 50% -10%, rgba(61,220,151,0.14) 0%, var(--card) 58%); }
.today-card.neg { border-color: rgba(240,101,95,0.3); background: radial-gradient(130% 150% at 50% -10%, rgba(240,101,95,0.14) 0%, var(--card) 58%); }
.today-label { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
.today-value { font-family: 'IBM Plex Mono', monospace; font-size: 44px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.today-value.pos { color: var(--green); text-shadow: 0 0 30px rgba(61,220,151,0.25); }
.today-value.neg { color: var(--red); text-shadow: 0 0 30px rgba(240,101,95,0.25); }
.today-value.empty { color: var(--text-faint); font-size: 20px; font-weight: 500; letter-spacing: 0; }
.today-pct { font-size: 17px; font-weight: 600; opacity: 0.7; letter-spacing: 0; }
.today-sub { font-size: 12px; color: var(--text-dim); margin-top: 12px; }
.today-sub.hit { color: var(--green); font-weight: 600; }
.today-sub.miss { color: var(--text-faint); }
.today-cta { margin-top: 18px; background: linear-gradient(180deg, #ecbd67, var(--gold-soft)); color: #241a06; border: none; padding: 12px 26px; border-radius: 12px; font-weight: 700; font-size: 13.5px; cursor: pointer; box-shadow: 0 4px 14px rgba(224,176,90,0.3); transition: transform 0.12s; }
.today-cta:active { transform: scale(0.96); }

/* ---------- Capital hero ---------- */
.capital-card { background: radial-gradient(130% 150% at 0% 0%, #221b0b 0%, var(--card) 55%); border: 1px solid rgba(224,176,90,0.3); border-radius: var(--r-lg); padding: 20px 20px 8px; margin-bottom: 12px; position: relative; overflow: hidden; box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.04); }
.capital-card::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px; background: linear-gradient(90deg, transparent, rgba(240,202,126,0.8), transparent); }
.capital-card .edit-cap { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 11.5px; font-weight: 500; transition: color 0.15s; }
.capital-card .edit-cap:hover { color: var(--gold); }
.cap-actions { position: absolute; top: 14px; right: 16px; display: flex; align-items: center; gap: 10px; z-index: 2; }
.eye-btn { background: none; border: none; color: var(--text-faint); cursor: pointer; width: 22px; height: 22px; padding: 0; display: flex; align-items: center; justify-content: center; transition: color 0.15s; }
.eye-btn svg { width: 18px; height: 18px; }
.eye-btn:hover { color: var(--gold); }
.cap-value.hidden-val { letter-spacing: 0.1em; opacity: 0.7; }
.cap-label { font-size: 10.5px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.11em; margin-bottom: 8px; }
.cap-value { font-family: 'IBM Plex Mono', monospace; font-size: 34px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; background: linear-gradient(160deg, #fdf3dd 0%, #f0ca7e 40%, #c99b45 85%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 1px 8px rgba(224,176,90,0.18)); }
.cap-sub { font-size: 12px; color: var(--text-dim); margin-top: 5px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 16px; }
.cap-sub .pos { color: var(--green); } .cap-sub .neg { color: var(--red); }
.cap-curve-title { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 4px; }
.curve-empty { text-align: center; padding: 18px 0 10px; color: var(--text-faint); font-size: 12px; }
.curve-draw { stroke-dasharray: 900; stroke-dashoffset: 900; animation: drawline 1.1s cubic-bezier(.4,0,.2,1) forwards; }

/* ---------- Month nav ---------- */
.nav { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 14px; }
.nav button { background: var(--card); border: 1px solid var(--line); color: var(--text); width: 36px; height: 36px; border-radius: 11px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.nav button:hover { background: var(--card-hover); }
.nav button:active { transform: scale(0.92); }
.nav .month-label { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; text-transform: capitalize; letter-spacing: -0.01em; }

/* ---------- Goal card ---------- */
.goal-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--shadow-card); }
.goal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.goal-label { font-size: 10.5px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.09em; }
.goal-rate { font-size: 11px; color: var(--gold); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.goal-edit { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 12px; font-weight: 500; padding: 2px 6px; transition: color 0.15s; }
.goal-edit:hover { color: var(--gold); }
.goal-track { height: 8px; border-radius: 6px; background: rgba(255,255,255,0.05); overflow: hidden; margin-bottom: 11px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }
.goal-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #b9862f, var(--gold), #f0ca7e); transition: width 0.8s cubic-bezier(.22,.9,.35,1); box-shadow: 0 0 10px rgba(224,176,90,0.35); position: relative; overflow: hidden; }
.goal-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.45) 50%, transparent 70%); transform: translateX(-100%); animation: shimmer 3.2s ease-in-out infinite; }
@keyframes shimmer { 0%, 55% { transform: translateX(-100%); } 90%, 100% { transform: translateX(100%); } }
.goal-fill.neg { background: linear-gradient(90deg, #8a2f2c, var(--red)); box-shadow: 0 0 10px rgba(240,101,95,0.3); }
.goal-nums { display: flex; align-items: baseline; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; }
.goal-nums .cur { font-size: 19px; font-weight: 700; }
.goal-nums .cur.pos { color: var(--green); } .goal-nums .cur.neg { color: var(--red); }
.goal-nums .target { font-size: 11.5px; color: var(--text-faint); }
.goal-banner { margin-top: 12px; background: var(--gold-dim); border: 1px solid rgba(224,176,90,0.22); border-radius: 10px; padding: 9px 12px; font-size: 12px; font-weight: 600; color: var(--gold); }

/* ---------- Calendar (weekdays only, 5 cols) ---------- */
.weekdays { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-bottom: 7px; }
.weekdays span { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-bottom: 16px; }
.cell { aspect-ratio: 1; border-radius: var(--r-sm); border: 1px solid var(--line); background: var(--card); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 0 3px 8px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; position: relative; overflow: hidden; transition: border-color 0.15s, transform 0.1s; }
.cell:active { transform: scale(0.93); }
.cell:hover { border-color: var(--line-strong); }
.cell.out { visibility: hidden; }
.cell .d { position: absolute; top: 6px; left: 8px; font-size: 9.5px; font-weight: 600; color: var(--text-faint); font-family: 'Inter', sans-serif; z-index: 2; opacity: 0.6; }
.cell.filled .d { color: rgba(255,255,255,0.55); }
.cell .p { font-size: 12px; font-weight: 800; line-height: 1.15; z-index: 2; text-align: center; letter-spacing: -0.02em; }
.cell .tgt { font-size: 9.5px; font-weight: 600; color: var(--gold); opacity: 0.85; line-height: 1.1; z-index: 2; text-align: center; }
.cell.today { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(224,176,90,0.35), 0 0 14px rgba(224,176,90,0.12); }
.note-dot { position: absolute; top: 6px; right: 7px; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); z-index: 3; }

/* ---------- KPI grid ---------- */
.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; margin-bottom: 14px; }
.kpi-grid.compact { grid-template-columns: repeat(3, 1fr); }
.kpi { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 13px 14px; box-shadow: var(--shadow-card); transition: border-color 0.15s; }
.kpi:hover { border-color: var(--line-strong); }
.kpi-top { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; }
.kpi-top svg { width: 14px; height: 14px; color: var(--text-faint); flex-shrink: 0; }
.kpi-label { font-size: 9.5px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
.kpi-val { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.kpi-val.pos { color: var(--green); } .kpi-val.neg { color: var(--red); }
.kpi-sub { font-size: 10.5px; color: var(--text-faint); margin-top: 3px; }

/* ---------- Forecast ---------- */
.forecast-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 17px 18px; margin-bottom: 14px; box-shadow: var(--shadow-card); }
.forecast-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.forecast-pills { display: flex; gap: 7px; margin-bottom: 13px; }
.forecast-pills button { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--text-dim); padding: 8px; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.forecast-pills button.active { background: var(--gold-dim); color: var(--gold); border-color: rgba(224,176,90,0.4); }
.forecast-legend { display: flex; gap: 15px; margin-bottom: 9px; font-size: 11.5px; }
.forecast-legend span { display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
.forecast-legend i { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
.forecast-rows { display: flex; flex-direction: column; gap: 9px; margin-top: 12px; }
.forecast-row { display: flex; justify-content: space-between; align-items: baseline; padding-top: 9px; border-top: 1px solid var(--line); }
.forecast-row .fl { font-size: 12px; color: var(--text-dim); }
.forecast-row .fv { font-family: 'IBM Plex Mono', monospace; font-size: 14.5px; font-weight: 700; }
.forecast-warn { font-size: 11px; color: var(--text-faint); margin-top: 13px; line-height: 1.55; padding-top: 11px; border-top: 1px solid var(--line); }

/* ---------- Year view ---------- */
.year-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-bottom: 14px; }
.year-months { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.mcard { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 13px; cursor: pointer; box-shadow: var(--shadow-card); transition: border-color 0.15s, transform 0.1s; }
.mcard:hover { border-color: var(--line-strong); }
.mcard:active { transform: scale(0.96); }
.mcard .mname { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: capitalize; margin-bottom: 7px; }
.mcard .mval { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; }
.mcard .mval.empty { color: var(--text-faint); font-weight: 400; }
.mcard.current { border-color: rgba(224,176,90,0.5); box-shadow: 0 0 14px rgba(224,176,90,0.1); }

/* ---------- Dash links ---------- */
.dash-link { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; color: var(--text); font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-card); transition: background 0.15s, border-color 0.15s; }
.dash-link:hover { background: var(--card-hover); border-color: var(--line-strong); }
.dash-link:active { transform: scale(0.985); }
.dash-link svg { width: 16px; height: 16px; color: var(--text-faint); }

/* ---------- Alert banners ---------- */
.backup-banner { background: var(--red-dim); border: 1px solid rgba(240,101,95,0.3); border-radius: var(--r-md); padding: 13px 16px; margin-bottom: 12px; cursor: pointer; }
.backup-banner .bb-title { font-size: 13px; font-weight: 700; color: #ff9d98; }
.backup-banner .bb-sub { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; }
.dd-banner { background: rgba(240,101,95,0.15); border: 1px solid rgba(240,101,95,0.4); border-radius: var(--r-md); padding: 13px 16px; margin-bottom: 12px; cursor: pointer; box-shadow: 0 0 20px rgba(240,101,95,0.08); }
.dd-banner .bb-title { font-size: 13px; font-weight: 700; color: #ff9d98; }
.dd-banner .bb-sub { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; }

/* ---------- Settings ---------- */
.settings-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 16px 18px; margin-bottom: 10px; box-shadow: var(--shadow-card); }
.settings-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.settings-label { font-size: 13.5px; color: var(--text); font-weight: 600; }
.settings-sub2 { font-size: 11px; color: var(--text-faint); margin-top: 3px; line-height: 1.45; }
.settings-val { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--gold); }
.settings-btn { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(224,176,90,0.25); padding: 9px 15px; border-radius: 10px; font-size: 12.5px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; transition: background 0.15s; }
.settings-btn:active { transform: scale(0.95); }
.export-btn { width: 100%; background: linear-gradient(180deg, #ecbd67, var(--gold-soft)); color: #241a06; border: none; padding: 14px; border-radius: 13px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(224,176,90,0.25); }
.export-btn:active { transform: scale(0.98); }
.export-btn svg { width: 17px; height: 17px; }

/* ---------- FAB ---------- */
.fab { position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; display: flex; justify-content: flex-end; padding: 0 18px; pointer-events: none; z-index: 20; box-sizing: border-box; }

/* ---------- Modals ---------- */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }

.modal input[type=text], .modal textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--text); border-radius: 11px; padding: 12px 13px; font-family: 'IBM Plex Mono', monospace; font-size: 16px; margin-bottom: 13px; transition: border-color 0.15s; }

.btn-save { background: linear-gradient(180deg, #ecbd67, var(--gold-soft)); color: #241a06; box-shadow: 0 3px 10px rgba(224,176,90,0.25); }

/* ---------- Lock screen ---------- */
.lock-screen { position: fixed; inset: 0; background: radial-gradient(120% 100% at 50% 0%, #12151a 0%, var(--bg) 60%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

.lock-dots { display: flex; gap: 18px; margin-bottom: 40px; }
.lock-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--text-faint); transition: background 0.12s, border-color 0.12s; }
.lock-dot.filled { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 10px rgba(224,176,90,0.4); }

.lock-key { width: 70px; height: 70px; border-radius: 50%; background: var(--card); border: 1px solid var(--line); color: var(--text); font-size: 23px; font-weight: 500; font-family: 'IBM Plex Mono', monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s, transform 0.1s; }
.lock-key:active { background: var(--card-hover); transform: scale(0.92); }

/* ---------- Chips (streak + level) ---------- */
.chip-row { display: flex; gap: 9px; margin-bottom: 12px; }
.chip { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 12px 10px; font-size: 12px; color: var(--text-dim); box-shadow: var(--shadow-card); }

.wk-total.pos { color: var(--green); } .wk-total.neg { color: var(--red); }

.forecast-pills button { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.forecast-pills button small { font-size: 9.5px; opacity: 0.65; font-family: 'IBM Plex Mono', monospace; }

/* ---------- Quote ---------- */
.quote { font-size: 12.5px; color: var(--text-dim); font-style: italic; text-align: center; padding: 2px 14px 12px; line-height: 1.5; opacity: 0.9; }

/* ---------- End of day ---------- */
.eod { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); font-size: 12px; font-weight: 600; color: var(--text-dim); }

/* ---------- Milestones ---------- */
.milestone-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md); padding: 15px 17px; margin-bottom: 12px; box-shadow: var(--shadow-card); }

.ms-ladder { display: flex; align-items: center; gap: 6px; margin-top: 12px; flex-wrap: wrap; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; }

.sim-intro { font-size: 12.5px; color: var(--text-dim); line-height: 1.55; margin-bottom: 14px; padding: 0 2px; }

</div>

async function computeAllTimeDrawdown(){
  const keys = lsListPrefix('month:');
  const parsed = keys.map(k => {
    const [y, m] = k.replace('month:','').split('-').map(Number);
    return { key: k, y, m: m - 1 };
  }).sort((a,b) => a.y - b.y || a.m - b.m);
  let cum = startingCapital, peak = startingCapital;
  for (const { key } of parsed) {
    const v = lsGet(key);
    if (!v) continue;
    const data = migrateData(JSON.parse(v));
    const days = Object.keys(data).map(Number).sort((a,b) => a - b);
    for (const d of days) { cum += data[d].pnl; if (cum > peak) peak = cum; }
  }
  const ddPct = peak > 0 ? ((peak - cum) / peak) * 100 : 0;
  return { currentCapital: cum, peak, ddPct };
}


async function getAllEntriesChrono(){
  const keys = lsListPrefix('month:').map(k=>{const p=k.replace('month:','').split('-');return{k,y:+p[0],m:+p[1]-1};}).sort((a,b)=>a.y-b.y||a.m-b.m);
  const out = [];
  for (const {k,y,m} of keys) {
    const v = lsGet(k); if (!v) continue;
    const data = migrateData(JSON.parse(v));
    const days = Object.keys(data).map(Number).sort((a,b)=>a-b);
    for (const d of days) out.push({ y, m, d, ...data[d] });
  }
  return out;
}

async function computeDisciplineStreak(){
  const cache = {};
  const getM = async (y,m) => { const k=y+'-'+m; if(!(k in cache)) cache[k]=await loadMonth(y,m); return cache[k]; };
  const isWk = dt => { const w = dt.getDay(); return w !== 0 && w !== 6; };
  let d = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const todayData = await getM(d.getFullYear(), d.getMonth());
  if (isWk(d) && todayData[d.getDate()] === undefined) d.setDate(d.getDate()-1);
  let streak = 0;
  for (let i = 0; i < 730; i++) {
    if (!isWk(d)) { d.setDate(d.getDate()-1); continue; }
    const data = await getM(d.getFullYear(), d.getMonth());
    if (data[d.getDate()] !== undefined) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

async function computeRecords(){
  const entries = await getAllEntriesChrono();
  let bestDay=null, worstDay=null, longestWin=0, curWin=0, cum=startingCapital, peak=startingCapital, maxDDeur=0;
  let wins=0, sumG=0, sumL=0;
  const byMonth = {};
  for (const e of entries) {
    const mk = e.y+'-'+e.m;
    byMonth[mk] = (byMonth[mk]||0) + e.pnl;
    if (e.pnl > 0) { wins++; sumG += e.pnl; curWin++; if (curWin > longestWin) longestWin = curWin; }
    else { sumL += Math.abs(e.pnl); curWin = 0; }
    if (!bestDay || e.pnl > bestDay.pnl) bestDay = e;
    if (!worstDay || e.pnl < worstDay.pnl) worstDay = e;
    cum += e.pnl; if (cum > peak) peak = cum;
    const dd = peak - cum; if (dd > maxDDeur) maxDDeur = dd;
  }
  let bestMonth = null;
  for (const mk in byMonth) {
    if (!bestMonth || byMonth[mk] > bestMonth.total) {
      const [y,m] = mk.split('-').map(Number);
      bestMonth = { total: byMonth[mk], y, m };
    }
  }
  const n = entries.length;
  return {
    entries, bestDay, worstDay, bestMonth, longestWin, maxDDeur,
    daysTraded: n,
    winRate: n ? Math.round(wins/n*100) : 0,
    profitFactor: sumL > 0 ? sumG/sumL : (sumG > 0 ? Infinity : 0)
  };
}

const LEVELS = [
  { name: 'Bronze', color: '#c88a5a', min: d => true },
  { name: 'Argent', color: '#b9c2cc', min: d => d.daysTraded >= 10 && d.streak >= 3 },
  { name: 'Gold',   color: '#e0b05a', min: d => d.daysTraded >= 30 && d.profitFactor >= 1.2 && d.winRate >= 50 },
  { name: 'Elite',  color: '#7dd3fc', min: d => d.daysTraded >= 75 && d.profitFactor >= 1.5 && d.winRate >= 55 },
  { name: 'Legend', color: '#c084fc', min: d => d.daysTraded >= 150 && d.profitFactor >= 1.8 && d.winRate >= 60 }
];
function computeLevel(rec, streak){
  const d = { ...rec, streak };
  let lvl = 0;
  for (let i = 0; i < LEVELS.length; i++) if (LEVELS[i].min(d)) lvl = i;
  const next = LEVELS[lvl+1] || null;
  let nextHint = '';
  if (next) {
    const needs = [];
    if (lvl === 0) { if (d.daysTraded < 10) needs.push((10-d.daysTraded)+' jours tradés'); if (d.streak < 3) needs.push('série de 3 jours'); }
    if (lvl === 1) { if (d.daysTraded < 30) needs.push((30-d.daysTraded)+' jours tradés'); if (d.profitFactor < 1.2) needs.push('PF ≥ 1.2'); if (d.winRate < 50) needs.push('WR ≥ 50%'); }
    if (lvl === 2) { if (d.daysTraded < 75) needs.push((75-d.daysTraded)+' jours tradés'); if (d.profitFactor < 1.5) needs.push('PF ≥ 1.5'); if (d.winRate < 55) needs.push('WR ≥ 55%'); }
    if (lvl === 3) { if (d.daysTraded < 150) needs.push((150-d.daysTraded)+' jours tradés'); if (d.profitFactor < 1.8) needs.push('PF ≥ 1.8'); if (d.winRate < 60) needs.push('WR ≥ 60%'); }
    nextHint = needs.length ? `Prochain : ${next.name} — il te manque ${needs.join(', ')}` : `Prochain : ${next.name}`;
  } else nextHint = 'Niveau maximum atteint';
  return { ...LEVELS[lvl], index: lvl, nextHint };
}

const WEEKDAY_NAMES = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
async function generateInsights(todayInfo){
  const rec = await computeRecords();
  const entries = rec.entries;
  const insights = [];

  if (todayInfo.entry && todayInfo.todayTarget > 0) {
    const diff = ((todayInfo.entry.pnl - todayInfo.todayTarget) / todayInfo.todayTarget) * 100;
    if (todayInfo.entry.pnl > 0 && diff >= 0) insights.push({ p: 1, t: `Aujourd'hui : ${fmtEUR(todayInfo.entry.pnl)}, soit ${Math.round(diff)}% au-dessus de ton objectif du jour.` });
    else if (todayInfo.entry.pnl > 0) insights.push({ p: 2, t: `Aujourd'hui : ${fmtEUR(todayInfo.entry.pnl)}, à ${Math.abs(Math.round(diff))}% de ton objectif du jour.` });
  }

  let tail = 0, tailSign = 0;
  for (let i = entries.length-1; i >= 0; i--) {
    const s = entries[i].pnl >= 0 ? 1 : -1;
    if (tail === 0) { tail = 1; tailSign = s; }
    else if (s === tailSign) tail++;
    else break;
  }
  if (tail >= 3 && tailSign > 0) insights.push({ p: 1, t: `${tail} journées positives d'affilée — belle régularité.` });
  if (tail >= 3 && tailSign < 0) insights.push({ p: 0, t: `${tail} pertes consécutives. Historiquement, réduire la taille des positions après une série de pertes limite les dégâts — surtout avec un bot martingale.` });

  if (entries.length >= 8) {
    let occ = 0, nextWins = 0;
    for (let i = 3; i < entries.length; i++) {
      if (entries[i-1].pnl > 0 && entries[i-2].pnl > 0 && entries[i-3].pnl > 0) {
        occ++; if (entries[i].pnl > 0) nextWins++;
      }
    }
    if (occ >= 4) {
      const r = Math.round(nextWins/occ*100);
      insights.push({ p: 3, t: `Après 3 journées gagnantes, ta journée suivante est positive dans ${r}% des cas (${occ} occurrences).` });
    }
  }

  const moodStats = {};
  for (const e of entries) if (e.mood) {
    moodStats[e.mood] = moodStats[e.mood] || { n: 0, losses: 0 };
    moodStats[e.mood].n++;
    if (e.pnl < 0) moodStats[e.mood].losses++;
  }
  for (const m in moodStats) {
    const s = moodStats[m];
    if (s.n >= 4) {
      const lr = Math.round(s.losses/s.n*100);
      if (lr >= 60) insights.push({ p: 0, t: `Tu perds ${lr}% du temps quand tu trades en étant ${MOOD_LABELS[m].split(' ')[1].toLowerCase()} (${s.n} journées).` });
    }
  }

  const wd = {};
  for (const e of entries) {
    const w = new Date(e.y, e.m, e.d).getDay();
    wd[w] = wd[w] || { n: 0, sum: 0 };
    wd[w].n++; wd[w].sum += e.pnl;
  }
  let bestW = null, worstW = null;
  for (const w in wd) {
    if (wd[w].n < 3) continue;
    const avg = wd[w].sum/wd[w].n;
    if (!bestW || avg > bestW.avg) bestW = { w, avg };
    if (!worstW || avg < worstW.avg) worstW = { w, avg };
  }
  if (bestW && worstW && bestW.w !== worstW.w && worstW.avg < 0) {
    insights.push({ p: 2, t: `Ton meilleur jour est le ${WEEKDAY_NAMES[bestW.w]} (${fmtEUR(bestW.avg)}/j en moyenne), ton pire le ${WEEKDAY_NAMES[worstW.w]} (${fmtEUR(worstW.avg)}/j).` });
  }

  insights.sort((a,b) => a.p - b.p);
  return insights.slice(0, 3);
}

function mondayOf(dt){

async function computeWeekSummary(monday){
  const cache = {};
  const getM = async (y,m) => { const k=y+'-'+m; if(!(k in cache)) cache[k]=await loadMonth(y,m); return cache[k]; };
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday); d.setDate(d.getDate()+i);
    const data = await getM(d.getFullYear(), d.getMonth());
    const e = data[d.getDate()];
    if (e !== undefined) days.push({ w: d.getDay(), pnl: e.pnl });
  }
  const total = days.reduce((a,b)=>a+b.pnl,0);
  const wins = days.filter(d=>d.pnl>0).length;
  let best = null, worst = null;
  for (const d of days) {
    if (!best || d.pnl > best.pnl) best = d;
    if (!worst || d.pnl < worst.pnl) worst = d;
  }
  return { total, count: days.length, winRate: days.length ? Math.round(wins/days.length*100) : 0, best, worst };
}

function computeKPIs(data){
  const entries = Object.entries(data).map(([d,e])=>({day:+d, val:e.pnl, note:e.note})).sort((a,b)=>a.day-b.day);
  const vals = entries.map(e=>e.val);
  const gains = vals.filter(v=>v>0);
  const losses = vals.filter(v=>v<0).map(v=>Math.abs(v));
  const sumGains = gains.reduce((a,b)=>a+b,0);
  const sumLosses = losses.reduce((a,b)=>a+b,0);
  const total = sumGains - sumLosses;
  const winRateFrac = vals.length ? gains.length/vals.length : 0;
  const profitFactor = sumLosses > 0 ? sumGains/sumLosses : (sumGains > 0 ? null : 0);
  const avgWin = gains.length ? sumGains/gains.length : 0;
  const avgLoss = losses.length ? sumLosses/losses.length : 0;
  const expectancy = winRateFrac*avgWin - (1-winRateFrac)*avgLoss;
  let cum = 0, peak = 0, maxDD = 0;
  const curve = [];
  for (const e of entries) { cum += e.val; curve.push({day: e.day, cum}); if (cum > peak) peak = cum; const dd = peak - cum; if (dd > maxDD) maxDD = dd; }
  let streak = 0, streakSign = 0;
  for (let i = entries.length-1; i >= 0; i--) { const s = entries[i].val >= 0 ? 1 : -1; if (streak === 0) { streak = 1; streakSign = s; } else if (s === streakSign) streak++; else break; }
  const best = vals.length ? Math.max(...vals) : null;
  const worst = vals.length ? Math.min(...vals) : null;
  return {entries, vals, total, winRateFrac, profitFactor, avgWin, avgLoss, expectancy, maxDD, curve, streak, streakSign, best, worst};
}

function smoothPath(pts){
  if (pts.length < 3) return 'M' + pts.map(p=>p.join(',')).join(' L');
  let d = `M${pts[0][0]},${pts[0][1]}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i-1)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(pts.length-1, i+2)];
    const c1x = p1[0] + (p2[0]-p0[0])/6, c1y = p1[1] + (p2[1]-p0[1])/6;
    const c2x = p2[0] - (p3[0]-p1[0])/6, c2y = p2[1] - (p3[1]-p1[1])/6;
    d += ` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d;
}

function renderCurve(curve){
  if (curve.length < 2) return `<div class="curve-empty">Ajoute au moins 2 jours pour voir la courbe</div>`;
  const w = 400, h = 90, pad = 6;
  const cums = curve.map(c=>c.cum);
  const min = Math.min(0, ...cums), max = Math.max(0, ...cums);
  const range = (max - min) || 1;
  const stepX = (w - pad*2) / (curve.length - 1);
  const pts = curve.map((c,i) => { const x = pad + i*stepX; const y = h - pad - ((c.cum - min) / range) * (h - pad*2); return [x,y]; });
  const linePath = smoothPath(pts);
  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const last = curve[curve.length-1].cum;
  const color = last >= 0 ? '#3ddc97' : '#f0655f';
  const gradId = 'g' + Math.random().toString(36).slice(2,8);
  const lastPt = pts[pts.length-1];
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:72px;display:block;overflow:visible">
    <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.32"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${areaPath}" fill="url(#${gradId})"/>
    <path class="curve-draw" d="${linePath}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" style="filter: drop-shadow(0 0 5px ${color}66)"/>
    <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="6" fill="${color}" opacity="0.18" style="animation: fadeUp 0.3s ease 0.9s both"/>
    <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="3" fill="${color}" style="animation: fadeUp 0.3s ease 0.9s both"/>
  </svg>`;
}

function computeMonthGoal(kpi, currentCapital, y, m){
  const capitalStartOfMonth = currentCapital - kpi.total;
  const weekdaysCount = weekdaysInMonthCount(y ?? viewYear, m ?? viewMonth);
  const goal = capitalStartOfMonth > 0 ? capitalStartOfMonth * (Math.pow(1 + forecastTargetPct/100, weekdaysCount) - 1) : 0;
  const pct = goal !== 0 ? (kpi.total/goal)*100 : 0;
  return { goal, pct: Math.max(0, Math.min(100, pct)), pctRaw: pct, crushed: kpi.total >= goal && goal > 0, capitalStartOfMonth };
}

async function computeTodayInfo(){
  const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
  const data = await loadMonth(y, m);
  const kpi = computeKPIs(data);
  const allTimeTotal = await getAllTimeTotal();
  const currentCapital = startingCapital + allTimeTotal;
  const goalInfo = computeMonthGoal(kpi, currentCapital, y, m);
  const dim = daysInMonth(y, m);
  let remainingDays = 0;
  for (let dd = d; dd <= dim; dd++) if (!isWeekendDay(y, m, dd)) remainingDays++;
  const targetFinalCapital = goalInfo.capitalStartOfMonth + goalInfo.goal;
  let dailyRate = 0;
  if (remainingDays > 0 && currentCapital > 0 && targetFinalCapital > currentCapital) {
    dailyRate = Math.pow(targetFinalCapital / currentCapital, 1/remainingDays) - 1;
  }
  const isWknd = isWeekendDay(y, m, d);
  const todayTarget = (!isWknd && dailyRate > 0) ? currentCapital * dailyRate : 0;
  return { entry: data[d], todayTarget, isWknd, currentCapital };
}

function compoundCurve(capital0, pct, days, sampleCount){
  const pts = [];
  const step = Math.max(1, Math.round(days/sampleCount));
  for (let d = 0; d <= days; d += step) pts.push(capital0 * Math.pow(1 + pct/100, d));
  if (pts.length && (days % step !== 0)) pts.push(capital0 * Math.pow(1 + pct/100, days));
  return pts;
}

function renderForecastChart(targetPts, realPts){
  const w = 400, h = 100, pad = 6;
  const all = targetPts.concat(realPts);
  const min = Math.min(...all), max = Math.max(...all);
  const range = (max - min) || 1;
  const toPath = (pts) => pts.map((v,i) => {
    const x = pad + (i/(pts.length-1)) * (w - pad*2);
    const y = h - pad - ((v - min)/range) * (h - pad*2);
    return [x,y];
  });
  const targetXY = toPath(targetPts);
  const realXY = toPath(realPts);
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:80px;display:block;overflow:visible">
    <path d="${smoothPath(realXY)}" fill="none" stroke="#9aa0a8" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="1 5" opacity="0.8"/>
    <path d="${smoothPath(targetXY)}" fill="none" stroke="#e0b05a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" style="filter: drop-shadow(0 0 5px rgba(224,176,90,0.4))"/>
  </svg>`;
}

function simCurve(capital0, gainPct, lossDays, lossPct, days){
  const pattern = [];
  for (let i = 0; i < 5; i++) pattern.push(i < 5 - lossDays ? gainPct : -lossPct);
  const pts = [capital0];
  let cap = capital0;
  for (let d = 0; d < days; d++) {
    cap *= (1 + pattern[d % 5]/100);
    if (cap < 0) cap = 0;
    pts.push(cap);
  }
  return pts;
}
function simSample(pts, n){
  const out = [];
  const step = Math.max(1, Math.floor(pts.length / n));
  for (let i = 0; i < pts.length; i += step) out.push(pts[i]);
  if (out[out.length-1] !== pts[pts.length-1]) out.push(pts[pts.length-1]);
  return out;
}
function setSimPct(delta){ simPct = Math.max(0.1, Math.round((simPct + delta)*10)/10); render(); }
function setSimLossPct(delta){ simLossPct = Math.max(0.1, Math.round((simLossPct + delta)*10)/10); render(); }
function setSimLossDays(n){ simLossDays = n; render(); }
function setSimHorizon(d){ simHorizon = d; render(); }

async function renderSimulator(){

  document.getElementById('app').innerHTML = `

    <div class="sim-card">
      <div class="sim-row">
        <div class="sim-label">Gain les jours gagnants</div>
        <div class="stepper"><button onclick="setSimPct(-0.5)">−</button><span>${simPct}%/j</span><button onclick="setSimPct(0.5)">+</button></div>
      </div>
      <div class="sim-row">
        <div class="sim-label">Jours perdants / semaine</div>
        <div class="pill-group">${[0,1,2,3].map(n=>`<button class="${simLossDays===n?'active':''}" onclick="setSimLossDays(${n})">${n}</button>`).join('')}</div>
      </div>
      <div class="sim-row">
        <div class="sim-label">Perte les jours perdants</div>
        <div class="stepper"><button onclick="setSimLossPct(-0.5)">−</button><span>−${simLossPct}%/j</span><button onclick="setSimLossPct(0.5)">+</button></div>
      </div>
      <div class="sim-row">
        <div class="sim-label">Horizon</div>
        <div class="pill-group">${[[21,'1 mois'],[63,'3 mois'],[126,'6 mois'],[252,'1 an']].map(([d,l])=>`<button class="${simHorizon===d?'active':''}" onclick="setSimHorizon(${d})">${l}</button>`).join('')}</div>
      </div>
    </div>

    <div class="sim-result">
      <div class="sim-final ${growth>=0?'pos':'neg'}">${fmtEURplain(finalCap)}</div>
      <div class="sim-growth">${growth>=0?'+':''}${growth.toFixed(0)}% sur la période</div>
      ${chart}

        <div class="proj"><div class="proj-h">Dans 30 jours</div><div class="proj-v" style="color:${v30>=cap0?'var(--green)':'var(--red)'}">${fmtEURplain(v30)}</div></div>
        <div class="proj"><div class="proj-h">Dans 90 jours</div><div class="proj-v" style="color:${v90>=cap0?'var(--green)':'var(--red)'}">${fmtEURplain(v90)}</div></div>

  `;

function milestoneCardHTML(currentCapital, avgDaily){
  const next = TIERS.find(t => t > currentCapital);
  if (!next) return `<div class="milestone-card"><div class="ms-head">🏦 Paliers</div><div class="ms-done">Tous les paliers atteints — jusqu'à 10 000 € !</div></div>`;
  const idx = TIERS.indexOf(next);
  const prev = idx === 0 ? 0 : TIERS[idx-1];
  const pct = Math.max(0, Math.min(100, ((currentCapital - prev) / (next - prev)) * 100));
  let eta = '';
  if (avgDaily > 0) {
    const d = Math.ceil((next - currentCapital) / avgDaily);
    eta = `<div class="ms-eta">⏱ ~${d} jour${d>1?'s':''} à ta moyenne actuelle (${fmtEUR(avgDaily)}/j)</div>`;
  } else {
    eta = `<div class="ms-eta">⏱ Moyenne actuelle négative ou nulle — estimation impossible</div>`;
  }
  const ladder = TIERS.map(t => `<span class="ms-tier ${currentCapital >= t ? 'done' : (t === next ? 'next' : '')}">${t >= 1000 ? (t/1000)+'k' : t}€</span>`).join('<span class="ms-sep">→</span>');
  return `
    <div class="milestone-card">
      <div class="ms-head"><span>🏦 Prochain palier</span><span class="ms-target">${fmtEURplain(next)}</span></div>
      <div class="goal-track" style="margin:10px 0 8px"><div class="goal-fill" style="width:${pct}%"></div></div>
      <div class="ms-sub">${fmtEURplain(currentCapital)} · ${Math.round(pct)}% du chemin depuis ${prev>0?fmtEURplain(prev):'le départ'}</div>
      ${eta}
      <div class="ms-ladder">${ladder}</div>
    </div>`;
}

async function checkAfterSave(){
  if (!(viewYear === today.getFullYear() && viewMonth === today.getMonth() && activeDay === today.getDate())) return;
  const allTimeTotal = await getAllTimeTotal();
  const cap = startingCapital + allTimeTotal;
  const unlocked = getUnlockedTiers();
  for (const t of TIERS) {
    if (cap >= t && !unlocked.includes(t)) {
      unlocked.push(t);
      saveUnlockedTiers(unlocked);
      showCelebration(t);
      return;
    }
  }
  const ti = await computeTodayInfo();
  if (ti.entry && ti.entry.pnl > 0 && ti.todayTarget > 0 && ti.entry.pnl >= ti.todayTarget) {
    showToast("🎯 Objectif journalier atteint — t'arrêter maintenant préserve tes statistiques.", 'ok');
    return;
  }
  const entries = (await computeRecords()).entries;
  let tail = 0;
  for (let i = entries.length-1; i >= 0; i--) { if (entries[i].pnl < 0) tail++; else break; }
  if (tail >= 3) showToast(`⚠️ ${tail} pertes d'affilée — selon ton historique, ralentir après une série de pertes limite les dégâts.`, 'warn');
}

async function renderMonth(){
  const kpi = computeKPIs(monthData);
  const allTimeTotal = await getAllTimeTotal();
  const currentCapital = startingCapital + allTimeTotal;
  const goalInfo = computeMonthGoal(kpi, currentCapital);
  const goal = goalInfo.goal;

  const dim = daysInMonth(viewYear, viewMonth);
  let startOffset = 0;
  for (let d = 1; d <= dim; d++) {
    if (!isWeekendDay(viewYear, viewMonth, d)) { startOffset = (new Date(viewYear, viewMonth, d).getDay() + 6) % 7; break; }
  }
  const isCurrentMonth = viewYear === today.getFullYear() && viewMonth === today.getMonth();
  const maxAbsMonth = Math.max(1, ...kpi.vals.map(v=>Math.abs(v)), 1);
  const targetFinalCapital = goalInfo.capitalStartOfMonth + goal;
  let remainingDays = 0;
  if (isCurrentMonth) {
    for (let d = today.getDate(); d <= dim; d++) if (!isWeekendDay(viewYear, viewMonth, d)) remainingDays++;
  }
  let dailyRate = 0;
  if (remainingDays > 0 && currentCapital > 0 && targetFinalCapital > currentCapital) {
    dailyRate = Math.pow(targetFinalCapital / currentCapital, 1/remainingDays) - 1;
  }
  const dayTargets = {};
  if (dailyRate > 0) {
    let tradingIndex = 0;
    for (let d = today.getDate(); d <= dim; d++) {
      if (isWeekendDay(viewYear, viewMonth, d)) continue;
      const capBeforeDay = currentCapital * Math.pow(1 + dailyRate, tradingIndex);
      dayTargets[d] = capBeforeDay * dailyRate;
      tradingIndex++;
    }
  }

  let cells = '';
  for (let i=0; i<startOffset; i++) cells += '<div class="cell out"></div>';
  for (let d=1; d<=dim; d++){
    if (isWeekendDay(viewYear, viewMonth, d)) continue;
    const entry = monthData[d];
    const has = entry !== undefined;
    const val = has ? entry.pnl : 0;
    const isToday = isCurrentMonth && d === today.getDate();
    const noteDot = (has && entry.note) ? `<div class="note-dot"></div>` : '';
    const showTarget = !has && isCurrentMonth && dayTargets[d] !== undefined;
    let content, cellStyle = '';
    if (has) {
      const intensity = 0.14 + 0.5 * (Math.abs(val)/maxAbsMonth);
      const tint = val >= 0 ? `rgba(52,201,142,${intensity})` : `rgba(232,97,92,${intensity})`;
      const textColor = val >= 0 ? '#5eeab0' : '#ff9d98';
      content = `<span class="p" style="color:${textColor}">${fmtEUR(val)}</span>`;
      cellStyle = ` style="background:${tint}"`;
    }
    else if (showTarget) content = `<span class="tgt">~${fmtEURplain(dayTargets[d])}</span>`;
    else content = '';
    cells += `<div class="cell ${has?'filled':'empty'} ${isToday?'today':''}"${cellStyle} onclick="openDay(${d})">
      ${noteDot}
      <span class="d">${d}</span>
      ${content}
    </div>`;
  }

  document.getElementById('app').innerHTML = `
    ${headerHTML()}
    <div class="view-toggle">
      <button class="active" onclick="setViewMode('month')">Mois</button>
      <button onclick="setViewMode('year')">Année</button>
    </div>
    <div class="nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label">${MONTHS_FR[viewMonth]} ${viewYear}</span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    ${goalCardHTML(kpi, goalInfo)}
    <div class="weekdays">${DAYS_FR.map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="grid">${cells}</div>
    ${(isCurrentMonth && dailyRate > 0) ? `<div style="font-size:11px;color:var(--text-faint);margin:-8px 0 16px;text-align:center">En or : objectif quotidien composé (${(dailyRate*100).toFixed(2)}%/jour) pour atteindre ton but</div>` : ''}
  `;
}

  document.getElementById('settingsSub').textContent = 'Ton capital initial sur le compte';
  document.getElementById('settingsInput').value = startingCapital.toString().replace('.', ',');
  document.getElementById('settingsOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('settingsInput').focus(), 50);
}
document.getElementById('settingsCancel').onclick = ()=> document.getElementById('settingsOverlay').classList.remove('show');
document.getElementById('settingsOverlay').addEventListener('click', (e)=>{ if (e.target.id === 'settingsOverlay') e.target.classList.remove('show'); });
document.getElementById('settingsSave').onclick = async ()=>{
  if (settingsField === 'accessPinSet') {
    const pinRaw = document.getElementById('settingsInput').value.replace(/\D/g,'');
    if (!/^\d{4}$/.test(pinRaw)) return;
    accessPin = pinRaw;
    await saveSettings();
    document.getElementById('settingsOverlay').classList.remove('show');
    render();
    return;
  }
  const raw = document.getElementById('settingsInput').value.replace(',', '.').replace(/\s/g,'');
  const n = parseFloat(raw);
  if (isNaN(n) || n < 0) return;
  if (settingsField === 'capital') startingCapital = n;
  if (settingsField === 'forecastTarget') forecastTargetPct = n;
  if (settingsField === 'drawdownThreshold') drawdownThresholdPct = n;
  await saveSettings();
  document.getElementById('settingsOverlay').classList.remove('show');
  render();
};

let selectedMood = null;
const MOOD_LABELS = { confiant: '😊 Confiant', normal: '😐 Normal', stresse: '😡 Stressé', fatigue: '😴 Fatigué' };
document.querySelectorAll('#moodRow button').forEach(btn => {
  btn.onclick = () => {
    const m = btn.getAttribute('data-mood');
    selectedMood = (selectedMood === m) ? null : m;
    updateMoodRow();
  };
});
function updateMoodRow(){
  document.querySelectorAll('#moodRow button').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-mood') === selectedMood);
  });
}

let activeDay = null;
async function quickAddToday(){
  const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
  currentPage = 'journal'; viewMode = 'month';
  if (viewYear !== y || viewMonth !== m) {
    viewYear = y; viewMonth = m;
    monthData = await loadMonth(viewYear, viewMonth);
    await render();
  } else {
    await render();
  }
  openDay(d);
}
function openDay(d){
  activeDay = d;
  const existing = monthData[d];
  sign = (existing !== undefined && existing.pnl < 0) ? 'perte' : 'gain';
  document.getElementById('modalDay').textContent = `${d} ${MONTHS_FR[viewMonth]}`;
  document.getElementById('amountInput').value = existing ? fmtEURplain(Math.abs(existing.pnl)).replace(' €','') : '';
  document.getElementById('noteInput').value = existing ? (existing.note || '') : '';
  selectedMood = existing ? (existing.mood || null) : null;
  updateMoodRow();
  document.getElementById('btnDelete').style.display = existing !== undefined ? 'block' : 'none';
  updateToggle();
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('amountInput').focus(), 50);
}
function updateToggle(){
  document.getElementById('btnGain').classList.toggle('active', sign === 'gain');
  document.getElementById('btnLoss').classList.toggle('active', sign === 'perte');
}
document.getElementById('btnGain').onclick = ()=>{ sign='gain'; updateToggle(); };
document.getElementById('btnLoss').onclick = ()=>{ sign='perte'; updateToggle(); };
document.getElementById('btnCancel').onclick = ()=> document.getElementById('overlay').classList.remove('show');
document.getElementById('btnSave').onclick = async ()=>{
  const raw = document.getElementById('amountInput').value.replace(',', '.').replace(/\s/g,'');
  const n = parseFloat(raw);
  if (isNaN(n) || n < 0) return;
  const note = document.getElementById('noteInput').value.trim();
  monthData[activeDay] = { pnl: Math.round((sign === 'perte' ? -n : n) * 100) / 100, note, mood: selectedMood };
  await saveMonth();
  document.getElementById('overlay').classList.remove('show');
  render();
  checkAfterSave();
};
document.getElementById('btnDelete').onclick = async ()=>{
  delete monthData[activeDay];
  await saveMonth();
  document.getElementById('overlay').classList.remove('show');
  render();
};
document.getElementById('overlay').addEventListener('click', (e)=>{ if (e.target.id === 'overlay') e.target.classList.remove('show'); });

async function exportCSV(){
  const rows = [['Date','Résultat net (€)','Note']];
  const keys = lsListPrefix('month:').sort();
  for (const k of keys) {
    const parts = k.replace('month:','').split('-');
    const y = parseInt(parts[0]), m = parseInt(parts[1]);
    const v = lsGet(k);
    if (!v) continue;
    const data = migrateData(JSON.parse(v));
    const days = Object.keys(data).map(x=>parseInt(x)).sort((a,b)=>a-b);
    for (const d of days) {
      const e = data[d];
      const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      rows.push([dateStr, e.pnl.toFixed(2).replace('.',','), (e.note||'').replace(/;/g,',')]);
    }
  }
  const csv = rows.map(r => r.join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'journal-trading-export.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  lastExportAt = Date.now();
  await saveSettings();
  render();
}

function isCurrentMonthJuly2026(){ return viewYear === 2026 && viewMonth === 6; }

let pinBuffer = '';
function buildLockScreen(){
  const wrap = document.createElement('div');
  wrap.innerHTML = `<div class="lock-screen" id="lockScreen">
    <div class="lock-title">Journal de trading</div>
    <div class="lock-sub">Entre ton code à 4 chiffres</div>
    <div class="lock-dots" id="lockDots">${[0,1,2,3].map(()=>'<div class="lock-dot"></div>').join('')}</div>
    <div class="lock-pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="lock-key" onclick="pinPress(${n})">${n}</button>`).join('')}
      <div class="lock-key empty"></div>
      <button class="lock-key" onclick="pinPress(0)">0</button>
      <button class="lock-key" onclick="pinBackspace()">⌫</button>
    </div>
  </div>`;
  document.body.appendChild(wrap.firstElementChild);
}
function updateLockDots(){
  document.querySelectorAll('#lockDots .lock-dot').forEach((d,i)=> d.classList.toggle('filled', i < pinBuffer.length));
}
function pinPress(n){
  if (pinBuffer.length >= 4) return;
  pinBuffer += n;
  updateLockDots();
  if (pinBuffer.length === 4) checkPin();
}
function pinBackspace(){ pinBuffer = pinBuffer.slice(0,-1); updateLockDots(); }
function checkPin(){
  if (pinBuffer === accessPin) {
    const el = document.getElementById('lockScreen');
    if (el) el.remove();
    render();
  } else {
    const dotsEl = document.getElementById('lockDots');
    dotsEl.classList.add('shake');
    setTimeout(()=>{ dotsEl.classList.remove('shake'); pinBuffer=''; updateLockDots(); }, 400);
  }
}

function enablePin(){
  settingsField = 'accessPinSet';
  document.getElementById('settingsTitle').textContent = "Créer un code d'accès";
  document.getElementById('settingsSub').textContent = 'Choisis un code à 4 chiffres';
  document.getElementById('settingsInput').value = '';
  document.getElementById('settingsInput').setAttribute('inputmode', 'numeric');
  document.getElementById('settingsOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('settingsInput').focus(), 50);
}
async function disablePin(){
  accessPin = null;
  await saveSettings();
  render();
}

(async function init(){
  const hadSettings = await loadSettings();
  if (!hadSettings) { startingCapital = 300; forecastTargetPct = 2; firstUseAt = Date.now(); await saveSettings(); }
  else if (!firstUseAt) { firstUseAt = Date.now(); await saveSettings(); }
  hideCapital = lsGet('hideCapital') === '1';
  monthData = await loadMonth(viewYear, viewMonth);
  if (isCurrentMonthJuly2026() && Object.keys(monthData).length === 0) {
    monthData = { "2": {pnl: 4.92, note: ''}, "3": {pnl: -7.61, note: ''} };
    await saveMonth();
  }
  if (accessPin) { buildLockScreen(); } else { render(); }
})();
</script>
